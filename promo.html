// Fuzzy match
function findProduct(q){
  if(!q)return null;
  const words=q.replace(/\[.*?\]/g,'').toLowerCase().split(/\s+/).filter(w=>w.length>2);
  let best=null,bestScore=0;
  P.forEach(p=>{
    const name=(p.n+' '+p.b).toLowerCase();
    let hits=0;
    words.forEach(w=>{if(name.indexOf(w)>=0)hits++});
    const score=words.length>0?hits/words.length:0;
    if(score>bestScore){bestScore=score;best=p}
  });
  return bestScore>=0.4?best:null;
}

const fmt=n=>'$'+n.toLocaleString('es-AR');
function li(url){
  if(ic[url])return Promise.resolve(ic[url]);
  return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{ic[url]=i;r(i)};i.onerror=()=>r(null);i.src=url});
}

// Drawing helpers
function solidText(ctx,t,x,y,color,font,align){
  ctx.save();ctx.font=font;ctx.textAlign=align||'center';
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillText(t,x+2,y+2);
  ctx.fillStyle=color;ctx.fillText(t,x,y);ctx.restore();
}
function wrapSolid(ctx,t,x,y,mw,lh,color,font){
  ctx.save();ctx.font=font;ctx.textAlign='center';
  const w=t.split(' ');let l='',lines=[];
  for(const s of w){const test=l+s+' ';if(ctx.measureText(test).width>mw&&l!==''){lines.push(l.trim());l=s+' '}else l=test}
  lines.push(l.trim());
  lines.forEach((ln,i)=>{
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillText(ln,x+2,y+i*lh+2);
    ctx.fillStyle=color;ctx.fillText(ln,x,y+i*lh);
  });
  ctx.restore();return y+(lines.length-1)*lh;
}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function smokeGlow(ctx,cx,cy,radius){
  ctx.save();
  [['rgba(0,200,255,.12)','rgba(0,200,255,0)',-.3,-.2],
   ['rgba(255,0,153,.1)','rgba(255,0,153,0)',.25,.15],
   ['rgba(153,51,255,.08)','rgba(153,51,255,0)',0,.3]].forEach(([c1,c2,ox,oy])=>{
    const g=ctx.createRadialGradient(cx+radius*ox,cy+radius*oy,0,cx,cy,radius);
    g.addColorStop(0,c1);g.addColorStop(.5,c1.replace(/\.\d+\)/,'.03)'));g.addColorStop(1,c2);
    ctx.fillStyle=g;ctx.fillRect(cx-radius,cy-radius,radius*2,radius*2);
  });ctx.restore();
}

async function genPost(p,disc,W,H){
  const cv=document.getElementById('cv');cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  const isStory=H>1400;
  const price=p.p;
  const np=Math.round(price*(1-disc/100));

  // Background
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.globalAlpha=.025;ctx.strokeStyle='#fff';ctx.lineWidth=1;
  for(let i=-H;i<W+H;i+=50){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke()}
  ctx.restore();

  // Top bar gradient
  let g=ctx.createLinearGradient(0,0,W,0);
  g.addColorStop(0,'#00C8FF');g.addColorStop(.5,'#FF0099');g.addColorStop(1,'#9933FF');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,5);
  // Bottom bar
  g=ctx.createLinearGradient(0,0,W,0);
  g.addColorStop(0,'#9933FF');g.addColorStop(.5,'#FF0099');g.addColorStop(1,'#00C8FF');
  ctx.fillStyle=g;ctx.fillRect(0,H-5,W,5);

  // Title bar
  const titleY=isStory?40:30;
  rr(ctx,50,titleY,W-100,80,10);
  g=ctx.createLinearGradient(50,titleY,W-50,titleY);g.addColorStop(0,'#FF0099');g.addColorStop(1,'#9933FF');
  ctx.fillStyle=g;ctx.fill();
  solidText(ctx,'OFERTA ESPECIAL',W/2,titleY+55,'#fff',"bold 48px 'Bebas Neue',sans-serif");

  // Separator
  const sepY=titleY+100;
  ctx.strokeStyle='#00C8FF';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2-160,sepY);ctx.lineTo(W/2+160,sepY);ctx.stroke();

  // Product image with smoke glow
  const imgY=isStory?580:460;
  smokeGlow(ctx,W/2,imgY,350);
  const img=await li(p.img);
  if(img){
    const a=img.width/img.height;let dw,dh;
    const mW=isStory?560:500,mH=isStory?560:480;
    if(a>mW/mH){dw=mW;dh=mW/a}else{dh=mH;dw=mH*a}
    ctx.drawImage(img,W/2-dw/2,imgY-dh/2,dw,dh);
  }

  // Product name
  const nameY=isStory?960:790;
  wrapSolid(ctx,p.n.toUpperCase(),W/2,nameY,W-100,52,'#fff',"bold 46px 'Rajdhani',sans-serif");
  solidText(ctx,p.b,W/2,nameY+60,'#00C8FF',"500 28px 'Rajdhani',sans-serif");

  // Prices
  const priceY=isStory?1100:920;
  solidText(ctx,fmt(price),W/2,priceY,'#666',"500 32px 'Rajdhani',sans-serif");
  ctx.save();ctx.font="500 32px 'Rajdhani',sans-serif";const m=ctx.measureText(fmt(price)).width;
  ctx.strokeStyle='#FF0099';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2-m/2,priceY-5);ctx.lineTo(W/2+m/2,priceY-5);ctx.stroke();ctx.restore();

  solidText(ctx,fmt(np),W/2,priceY+80,'#FF0099',"bold 82px 'Bebas Neue',sans-serif");

  // Discount badge
  rr(ctx,W/2-70,priceY+95,140,40,20);ctx.fillStyle='#9933FF';ctx.fill();
  solidText(ctx,'-'+disc+'% OFF',W/2,priceY+123,'#fff',"bold 24px 'Rajdhani',sans-serif");

  // CTA
  const ctaY=isStory?1320:1170;
  rr(ctx,W/2-160,ctaY,320,60,30);
  g=ctx.createLinearGradient(W/2-160,0,W/2+160,0);g.addColorStop(0,'#00C8FF');g.addColorStop(1,'#9933FF');
  ctx.fillStyle=g;ctx.fill();
  solidText(ctx,'APROVECHA AHORA',W/2,ctaY+40,'#fff',"bold 26px 'Rajdhani',sans-serif");

  // "SOLO POR TIEMPO LIMITADO"
  solidText(ctx,'SOLO POR TIEMPO LIMITADO',W/2,ctaY+85,'#888',"600 20px 'Rajdhani',sans-serif");

  // Logo
  if(logoImg){const la=logoImg.width/logoImg.height;ctx.drawImage(logoImg,24,H-68,38*la,38)}
  solidText(ctx,'@maxupsuplementos',W-30,H-25,'#555',"500 20px 'Rajdhani',sans-serif",'right');
}

let product=null;

async function init(){
  document.getElementById('info').textContent='Cargando catálogo...';
  // Intentar cargar desde API
  try{
    const resp=await fetch(API_URL+'?accion=catalogo');
    const data=await resp.json();
    if(data.productos && data.productos.length>0){
      P=data.productos.map(function(pr){
        var imgUrl=String(pr.imagen_url||'').trim();
        // Si la imagen no pasa por weserv, proxyarla para evitar CORS
        if(imgUrl && imgUrl.indexOf('weserv.nl')<0 && imgUrl.indexOf('data:')<0){
          imgUrl='https://images.weserv.nl/?url='+encodeURIComponent(imgUrl.replace(/^https?:\/\//,''))+'&w=500&output=webp&q=82';
        }
        return {
          id:pr.id||pr.nombre,
          n:pr.nombre||'',
          b:pr.marca||'',
          p:Number(pr.precio_venta)||0,
          img:imgUrl,
          cat:pr.categoria||'otros'
        };
      });
      document.getElementById('st').textContent='Catálogo cargado desde API: '+P.length+' productos';
    } else {
      throw new Error('Sin productos');
    }
  }catch(err){
    // Fallback al catálogo local
    P=P_FALLBACK;
    document.getElementById('st').textContent='Usando catálogo local ('+P.length+' productos)';
  }

  if(!query){
    document.getElementById('info').innerHTML='Usá <b>?q=nombre+producto&desc=15</b> en la URL para generar una promo.';
    return;
  }

  product=findProduct(query);
  if(product){
    document.getElementById('info').textContent='Producto encontrado — Descuento: '+descPct+'%';
    document.getElementById('found').textContent=product.n+' — '+product.b+' — '+fmt(product.p)+' → '+fmt(Math.round(product.p*(1-descPct/100)));
    setTimeout(()=>genPost(product,descPct,1080,1350),600);
  } else {
    document.getElementById('info').innerHTML='No se encontró "<b>'+query+'</b>" en el catálogo.<br>Verificá el nombre del producto.';
    document.getElementById('found').textContent='';
  }
}

init();

function genStory(){
  if(!product)return;
  currentMode='story';
  genPost(product,descPct,1080,1920);
  document.getElementById('st').textContent='Story 1080x1920 generada';
}

function dl(){
  const cv=document.getElementById('cv');const a=document.createElement('a');
  const d=new Date().toISOString().slice(0,10);
  a.download='MAXUP_promo_'+(product?product.id:'post')+'_'+descPct+'off_'+d+'.png';
  a.href=cv.toDataURL('image/png');a.click();
}
</script>

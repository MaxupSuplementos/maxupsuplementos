<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — MAXUP Suplementos</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:Rajdhani,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.container{text-align:center;padding:40px 24px;max-width:520px}
.code{font-family:Bebas Neue,sans-serif;font-size:clamp(6rem,20vw,12rem);line-height:1;
  background:linear-gradient(135deg,#00C8FF,#9933FF,#FF0099);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{0%{filter:brightness(1)}100%{filter:brightness(1.3)}}
.emoji{font-size:3rem;margin:16px 0}
h1{font-family:Bebas Neue,sans-serif;font-size:1.8rem;letter-spacing:.1em;margin-bottom:8px}
p{color:#888;font-size:1rem;margin-bottom:24px;line-height:1.6}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:12px 28px;border-radius:10px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:.95rem;text-decoration:none;letter-spacing:.06em;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#00C8FF,#9933FF);color:#fff;border:none}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,200,255,.3)}
.btn-outline{border:1px solid rgba(255,255,255,.15);color:#aaa;background:none}
.btn-outline:hover{border-color:var(--cyan);color:#00C8FF}
.bg-glow{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(120px);opacity:.15;pointer-events:none}
.bg1{background:#00C8FF;top:-100px;left:-100px}
.bg2{background:#FF0099;bottom:-100px;right:-100px}
</style>
</head>
<body>
<div class="bg-glow bg1"></div>
<div class="bg-glow bg2"></div>
<div class="container">
  <div class="code">404</div>
  <div class="emoji">🏋️</div>
  <h1>ESTA PÁGINA NO EXISTE</h1>
  <p>Parece que esta URL no lleva a ningún lado. Pero tranqui, nuestro catálogo con +170 productos te espera.</p>
  <div class="btns">
    <a href="index.html" class="btn btn-primary">Ver Suplementos</a>
    <a href="https://wa.me/5491168461457" target="_blank" class="btn btn-outline">📲 WhatsApp</a>
  </div>
</div>
</body>
</html>

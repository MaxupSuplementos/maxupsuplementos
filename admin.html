<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — MAXUP</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00C8FF;--pink:#FF0099;--green:#00E676;--orange:#FFA500;--red:#FF3D3D;
  --dark:#0a0a0a;--dark2:#111;--dark3:#1a1a1a;--white:#fff;--gray:#999;
  --grad:linear-gradient(135deg,var(--cyan),var(--pink))}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,200,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.02) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:0}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--dark);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--dark2);border:1px solid rgba(0,200,255,.15);border-radius:16px;
  padding:40px;width:100%;max-width:360px;text-align:center}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.1em;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.login-sub{color:var(--gray);font-size:.85rem;margin-bottom:28px}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(0,200,255,.2);
  color:var(--white);font-family:'Rajdhani',sans-serif;font-size:1rem;
  padding:12px 16px;border-radius:8px;outline:none;text-align:center;
  letter-spacing:.1em;margin-bottom:14px;transition:border .2s}
.login-input:focus{border-color:var(--cyan)}
.login-btn{width:100%;padding:13px;background:var(--grad);color:#000;border:none;
  border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;
  letter-spacing:.1em;cursor:pointer;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-error{color:var(--red);font-size:.82rem;margin-top:8px;display:none}

/* LAYOUT */
#app{display:none;min-height:100vh;position:relative;z-index:1}
header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,200,255,.1);padding:12px 20px;
  display:flex;align-items:center;gap:12px}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-badge{background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.2);
  color:var(--cyan);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.06em}
.header-logout{margin-left:auto;color:var(--gray);font-size:.8rem;cursor:pointer;
  background:none;border:none;font-family:'Rajdhani',sans-serif;font-weight:600;
  letter-spacing:.05em;transition:color .2s}
.header-logout:hover{color:var(--red)}
.header-refresh{color:var(--gray);font-size:.8rem;cursor:pointer;background:none;border:none;
  font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.05em;transition:color .2s;margin-left:8px}
.header-refresh:hover{color:var(--cyan)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.06);
  background:var(--dark2);overflow-x:auto;position:sticky;top:57px;z-index:99}
.tab{padding:12px 18px;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.08em;
  color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--white)}
.tab.activo{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab .badge{background:var(--pink);color:#fff;font-size:.6rem;padding:1px 5px;
  border-radius:10px;margin-left:4px;vertical-align:middle}

/* CONTENIDO */
.content{padding:20px;max-width:900px;margin:0 auto}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px}
.stat-label{color:var(--gray);font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em}
.stat-val.cyan{color:var(--cyan)}
.stat-val.green{color:var(--green)}
.stat-val.pink{color:var(--pink)}
.stat-sub{font-size:.75rem;color:var(--gray);margin-top:4px}
.stat-sub.up{color:var(--green)}
.stat-sub.down{color:var(--red)}

/* SECCIÓN */
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;
  color:var(--gray);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title span{color:var(--cyan)}

/* TABLA PEDIDOS */
.pedido-card{background:var(--dark2);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .2s}
.pedido-card:hover{border-color:rgba(0,200,255,.2)}
.pedido-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.pedido-codigo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--cyan);letter-spacing:.08em}
.pedido-cliente{font-weight:700;font-size:.95rem}
.pedido-fecha{color:var(--gray);font-size:.78rem;margin-left:auto}
.pedido-info{display:flex;gap:16px;flex-wrap:wrap;font-size:.82rem;color:var(--gray);margin-bottom:10px}
.pedido-info strong{color:var(--white)}
.pedido-productos{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:10px;line-height:1.5}
.pedido-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-estado{padding:5px 12px;border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;
  font-size:.78rem;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .2s}
.btn-prep{background:rgba(255,165,0,.15);color:var(--orange);border:1px solid rgba(255,165,0,.3)}
.btn-prep:hover{background:rgba(255,165,0,.3)}
.btn-listo{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.btn-listo:hover{background:rgba(0,230,118,.3)}
.btn-enviado{background:rgba(0,200,255,.15);color:var(--cyan);border:1px solid rgba(0,200,255,.3)}
.btn-enviado:hover{background:rgba(0,200,255,.3)}
.btn-entregado{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.btn-entregado:hover{background:rgba(0,230,118,.3)}
.btn-retirado{background:rgba(0,230,118,.15);color:#4FC3F7;border:1px solid rgba(79,195,247,.3)}
.btn-retirado:hover{background:rgba(79,195,247,.3)}
.btn-cancelar{background:rgba(255,61,61,.1);color:var(--red);border:1px solid rgba(255,61,61,.2)}
.btn-cancelar:hover{background:rgba(255,61,61,.25)}

/* BADGE ESTADO */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.05em}
.badge-Recibido{background:rgba(0,200,255,.15);color:var(--cyan);border:1px solid rgba(0,200,255,.3)}
.badge-preparacion{background:rgba(255,165,0,.15);color:var(--orange);border:1px solid rgba(255,165,0,.3)}
.badge-listo{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.badge-Enviado{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.badge-Entregado{background:rgba(0,230,118,.2);color:var(--green);border:1px solid rgba(0,230,118,.4)}
.badge-Retirado{background:rgba(0,230,118,.2);color:var(--green);border:1px solid rgba(0,230,118,.4)}
.badge-Cancelado{background:rgba(255,61,61,.15);color:var(--red);border:1px solid rgba(255,61,61,.3)}

/* STOCK */
.stock-item{display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:8px}
.stock-nombre{flex:1;font-weight:600;font-size:.9rem}
.stock-marca{font-size:.75rem;color:var(--gray)}
.stock-num{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;min-width:36px;text-align:right}
.stock-num.cero{color:var(--red)}
.stock-num.bajo{color:var(--orange)}
.stock-num.ok{color:var(--green)}

/* CLIENTES */
.cliente-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--dark2);border:1px solid rgba(0,230,118,.1);border-radius:8px;margin-bottom:8px}
.cliente-info{flex:1}
.cliente-nombre{font-weight:700;font-size:.92rem}
.cliente-tel{font-size:.78rem;color:var(--gray)}
.cliente-badge{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25);
  padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;white-space:nowrap}

/* VENTAS DEL DÍA */
.venta-item{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem}
.venta-item:last-child{border-bottom:none}
.venta-prod{color:var(--white);flex:1}
.venta-cli{color:var(--gray);font-size:.75rem;margin-top:1px}
.venta-monto{color:var(--cyan);font-weight:700;font-family:'Bebas Neue',sans-serif;font-size:1rem}

/* FILTRO */
.filtro-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filtro-input{background:rgba(255,255,255,.06);border:1px solid rgba(0,200,255,.15);
  color:var(--white);font-family:'Rajdhani',sans-serif;font-size:.88rem;
  padding:7px 12px;border-radius:8px;outline:none;transition:border .2s}
.filtro-input:focus{border-color:var(--cyan)}
.filtro-btn{padding:7px 14px;border:1px solid rgba(0,200,255,.2);border-radius:8px;
  background:rgba(0,200,255,.08);color:var(--cyan);font-family:'Rajdhani',sans-serif;
  font-size:.82rem;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .2s}
.filtro-btn:hover,.filtro-btn.activo{background:rgba(0,200,255,.2);border-color:var(--cyan)}

/* LOADING / EMPTY */
.loading-txt{text-align:center;color:var(--gray);padding:32px;font-size:.9rem}
.empty-txt{text-align:center;color:var(--gray);padding:24px;font-size:.88rem}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--dark3);border:1px solid rgba(0,200,255,.3);color:var(--white);
  padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:600;
  z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:600px){
  .content{padding:14px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .pedido-fecha{width:100%;margin-left:0}
  .tab{padding:10px 12px;font-size:.8rem}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">MAXUP</div>
    <div class="login-sub">Panel de Administración</div>
    <input type="password" class="login-input" id="claveInput" placeholder="Clave de acceso"
      onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">INGRESAR</button>
    <div class="login-error" id="loginError">Clave incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <span class="header-logo">MAXUP</span>
    <span class="header-badge">ADMIN</span>
    <button class="header-refresh" onclick="recargarTab()">⟳ Actualizar</button>
    <span id="autoRefreshStatus" style="font-size:.7rem;color:var(--green);letter-spacing:.04em" title="Se actualiza cada 30s">● LIVE</span>
    <a href="index.html" style="margin-left:auto;color:var(--cyan);font-size:.8rem;text-decoration:none;padding:4px 12px;border:1px solid rgba(0,200,255,.3);border-radius:6px;font-weight:600;transition:all .2s" onmouseover="this.style.background='rgba(0,200,255,.1)'" onmouseout="this.style.background='none'">🏪 Ir a la tienda</a>
    <button class="header-logout" onclick="logout()">Salir</button>
  </header>

  <!-- BANNER MANTENIMIENTO (visible solo cuando está activo) -->
  <div id="mantBanner" style="display:none;background:linear-gradient(135deg,rgba(255,0,153,.1),rgba(153,51,255,.1));border:1px solid rgba(255,0,153,.3);padding:10px 16px;text-align:center;font-size:.85rem;font-weight:700;color:var(--pink)">
    🔧 MODO MANTENIMIENTO ACTIVO — <span id="mantBannerMsg"></span>
    <button onclick="toggleMantenimiento(false)" style="background:none;border:1px solid var(--pink);color:var(--pink);padding:3px 10px;border-radius:6px;margin-left:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.78rem">DESACTIVAR</button>
  </div>

  <div class="tabs">
    <button class="tab activo" onclick="switchTab('resumen',this)">📊 Resumen</button>
    <button class="tab" onclick="switchTab('dashboard',this)">📈 Dashboard</button>
    <button class="tab" onclick="switchTab('pedidos',this)">📦 Pedidos <span class="badge" id="badgePedidos"></span></button>
    <button class="tab" onclick="switchTab('stock',this)">⚠️ Stock bajo <span class="badge" id="badgeStock" style="display:none;background:var(--orange)"></span></button>
    <button class="tab" onclick="switchTab('cupones',this)">🏷️ Cupones</button>
    <button class="tab" onclick="switchTab('descuentos',this)">🎁 Descuentos</button>
    <button class="tab" onclick="switchTab('vencer',this)">⏰ Por vencer <span class="badge" id="badgeVencer"></span></button>
    <button class="tab" onclick="switchTab('log',this)">📋 Actividad</button>
    <button class="tab" onclick="switchTab('ajustes',this)">⚙️ Ajustes</button>
  </div>

  <div class="content">
    <div id="tabResumen"></div>
    <div id="tabDashboard" style="display:none"></div>
    <div id="tabPedidos" style="display:none"></div>
    <div id="tabStock" style="display:none"></div>
    <div id="tabCupones" style="display:none"></div>
    <div id="tabDescuentos" style="display:none"></div>
    <div id="tabVencer" style="display:none"></div>
    <div id="tabLog" style="display:none"></div>
    <div id="tabAjustes" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwUujcSoSyBWLLla-LOdovJmTDan-DP3O9Gp0k_MSupTHGEPB55TCZqllvGmEK6vlk/exec';
let clave = '';
let tabActual = 'resumen';
let filtroEstado = 'todos';
let busquedaPedido = '';
let _lastPedidoCount = -1;
let _autoRefreshTimer = null;

// ── LOGIN (valida contra la API, no hardcodeada) ─────────────
function login() {
  const input = document.getElementById('claveInput').value.trim();
  if (!input) return;
  var btn = document.querySelector('.login-btn');
  btn.textContent = 'VERIFICANDO...'; btn.disabled = true;
  // Intentar una consulta real a la API con la clave ingresada
  fetch(API_URL + '?accion=admin_resumen&clave=' + encodeURIComponent(input))
    .then(function(r){ return r.json(); })
    .then(function(data){
      btn.textContent = 'INGRESAR'; btn.disabled = false;
      if (data.ok) {
        clave = input;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        cargarResumen();
        iniciarAutoRefresh();
        _chequearMant();
        logActivity('Login exitoso', 'Acceso al panel de administración');
      } else {
        document.getElementById('loginError').style.display = 'block';
        setTimeout(function(){ document.getElementById('loginError').style.display='none'; }, 2500);
      }
    })
    .catch(function(){
      btn.textContent = 'INGRESAR'; btn.disabled = false;
      document.getElementById('loginError').textContent = 'Error de conexión';
      document.getElementById('loginError').style.display = 'block';
      setTimeout(function(){
        document.getElementById('loginError').textContent = 'Clave incorrecta';
        document.getElementById('loginError').style.display='none';
      }, 2500);
    });
}
function logout() {
  clave = '';
  detenerAutoRefresh();
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('claveInput').value = '';
}

// ── AUTO-REFRESH (cada 30s, con sonido si hay pedido nuevo) ──
function _beep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Doble beep para que se escuche bien
    [0, 0.2].forEach(function(delay) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.value = 0.3;
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.15);
    });
  } catch(e){}
}

function iniciarAutoRefresh() {
  detenerAutoRefresh();
  _autoRefreshTimer = setInterval(function() {
    // Chequear pedidos nuevos silenciosamente
    fetch(API_URL + '?accion=admin_pedidos&clave=' + encodeURIComponent(clave))
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (!data.ok) return;
        var pedidos = data.pedidos || [];
        var pendientes = pedidos.filter(function(p){ return p.estado==='Recibido'||p.estado==='En preparación'; }).length;

        // Actualizar badge
        var badge = document.getElementById('badgePedidos');
        if (pendientes > 0) { badge.textContent = pendientes; badge.style.display = 'inline'; }
        else badge.style.display = 'none';

        // Si hay más pedidos que antes → pedido nuevo!
        if (_lastPedidoCount >= 0 && pedidos.length > _lastPedidoCount) {
          _beep();
          showToast('🔔 ¡Nuevo pedido recibido!');
          // Si estás en la pestaña de pedidos, actualizar la lista
          if (tabActual === 'pedidos') {
            window._pedidosCache = pedidos;
            renderPedidos(pedidos);
          }
          // Si estás en resumen, recargar
          if (tabActual === 'resumen') cargarResumen();
        }
        _lastPedidoCount = pedidos.length;

        // Parpadeo del indicador LIVE
        var live = document.getElementById('autoRefreshStatus');
        if (live) { live.style.opacity = '0.3'; setTimeout(function(){ live.style.opacity = '1'; }, 500); }
      }).catch(function(){});
  }, 30000);
}

function detenerAutoRefresh() {
  if (_autoRefreshTimer) { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null; }
}

// ── TABS ─────────────────────────────────────────────────────
var ALL_TABS = ['resumen','dashboard','pedidos','stock','cupones','descuentos','vencer','log','ajustes'];

function switchTab(tab, el) {
  tabActual = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('activo'); });
  el.classList.add('activo');
  ALL_TABS.forEach(function(t){
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'resumen')     cargarResumen();
  if (tab === 'dashboard')   cargarDashboard();
  if (tab === 'pedidos')     cargarPedidos();
  if (tab === 'stock')       cargarStock();
  if (tab === 'cupones')     cargarCupones();
  if (tab === 'descuentos')  cargarDescuentos();
  if (tab === 'vencer')      cargarVencer();
  if (tab === 'log')         cargarLog();
  if (tab === 'ajustes')     cargarAjustes();
}

function recargarTab() {
  var fn = {resumen:cargarResumen,dashboard:cargarDashboard,pedidos:cargarPedidos,stock:cargarStock,
    cupones:cargarCupones,descuentos:cargarDescuentos,vencer:cargarVencer,log:cargarLog,ajustes:cargarAjustes};
  if(fn[tabActual]) fn[tabActual]();
}

// ── HELPERS ──────────────────────────────────────────────────
function api(params) {
  return fetch(API_URL + '?' + params + '&clave=' + encodeURIComponent(clave))
    .then(function(r){ return r.json(); });
}
function fmt(n) { return '$' + Number(n).toLocaleString('es-AR'); }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
function getBadgeClass(estado) {
  var map = {'Recibido':'badge-Recibido','En preparación':'badge-preparacion',
    'Listo para retirar':'badge-listo','Enviado':'badge-Enviado',
    'Entregado':'badge-Entregado','Retirado':'badge-Retirado','Cancelado':'badge-Cancelado'};
  return map[estado] || 'badge-Recibido';
}

// ── RESUMEN ──────────────────────────────────────────────────
function cargarResumen() {
  var el = document.getElementById('tabResumen');
  el.innerHTML = '<div class="loading-txt">Cargando resumen...</div>';
  api('accion=admin_resumen').then(function(data) {
    if (!data.ok) { el.innerHTML = '<div class="empty-txt">Error: ' + data.error + '</div>'; return; }

    var diff = data.ayer > 0 ? Math.round((data.hoy - data.ayer) / data.ayer * 100) : 0;
    var diffClass = diff >= 0 ? 'up' : 'down';
    var diffTxt = (diff >= 0 ? '▲' : '▼') + ' ' + Math.abs(diff) + '% vs ayer';

    var ticketHtml = '';
    if(data.ventasHoy > 0){
      var ticketProm = Math.round(data.hoy / data.ventasHoy);
      ticketHtml = '<div class="stat-card"><div class="stat-label">Ticket promedio</div><div class="stat-val cyan">' + fmt(ticketProm) + '</div></div>';
    }

    var html = '<div class="stats-grid">'
      + '<div class="stat-card"><div class="stat-label">Facturado hoy</div><div class="stat-val cyan">' + fmt(data.hoy) + '</div><div class="stat-sub ' + diffClass + '">' + diffTxt + '</div></div>'
      + '<div class="stat-card"><div class="stat-label">Ventas hoy</div><div class="stat-val green">' + data.ventasHoy + '</div><div class="stat-sub">Ayer: ' + data.ventasAyer + '</div></div>'
      + '<div class="stat-card"><div class="stat-label">Pedidos web</div><div class="stat-val pink">' + data.pedidosWeb + '</div><div class="stat-sub">Hoy ' + data.fecha + '</div></div>'
      + '<div class="stat-card"><div class="stat-label">Facturado ayer</div><div class="stat-val" style="color:var(--gray)">' + fmt(data.ayer) + '</div><div class="stat-sub">' + data.ventasAyer + ' ventas</div></div>'
      + ticketHtml
      + '</div>';

    // Alerta de stock bajo
    if(data.stockBajo && data.stockBajo.length > 0){
      var badge = document.getElementById('badgeStock');
      if(badge){ badge.textContent = data.stockBajo.length; badge.style.display='inline'; }
      html += '<div style="background:rgba(255,165,0,.08);border:1px solid rgba(255,165,0,.25);border-radius:10px;padding:14px;margin-bottom:16px">'
        + '<div style="font-weight:700;font-size:.9rem;color:var(--orange);margin-bottom:8px">⚠️ ALERTA: ' + data.stockBajo.length + ' producto(s) con stock bajo</div>';
      data.stockBajo.forEach(function(p){
        html += '<div style="font-size:.82rem;color:var(--gray);padding:2px 0">' + (p.stock===0?'🔴':'🟡') + ' <strong style="color:var(--white)">' + p.nombre + '</strong> — ' + p.stock + ' unid.</div>';
      });
      html += '<button class="filtro-btn" style="margin-top:8px" onclick="switchTab(\'stock\',document.querySelectorAll(\'.tab\')[3])">Ver todos →</button></div>';
    }

    if (data.items && data.items.length > 0) {
      html += '<div class="section-title">Ventas de hoy <span>(' + data.items.length + ')</span></div>'
        + '<div style="background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px">';
      data.items.forEach(function(item) {
        html += '<div class="venta-item">'
          + '<div><div class="venta-prod">' + item.producto + (item.cantidad > 1 ? ' ×' + item.cantidad : '') + '</div>'
          + (item.cliente ? '<div class="venta-cli">' + item.cliente + '</div>' : '') + '</div>'
          + '<div class="venta-monto">' + fmt(item.monto) + '</div>'
          + '</div>';
      });
      html += '</div>';
    } else {
      html += '<div class="empty-txt">No hay ventas registradas hoy todavía.</div>';
    }

    el.innerHTML = html;
  }).catch(function(){ el.innerHTML = '<div class="empty-txt">⚠️ No se pudo conectar.</div>'; });
}

// ── PEDIDOS ──────────────────────────────────────────────────
function cargarPedidos() {
  var el = document.getElementById('tabPedidos');
  el.innerHTML = '<div class="loading-txt">Cargando pedidos...</div>';

    if (!data.ok) { el.innerHTML = '<div class="empty-txt">Error: ' + data.error + '</div>'; return; }

    var pedidos = data.pedidos || [];
    var pendientes = pedidos.filter(function(p){ return p.estado === 'Recibido' || p.estado === 'En preparación'; }).length;
    var badge = document.getElementById('badgePedidos');
    if (pendientes > 0) { badge.textContent = pendientes; badge.style.display = 'inline'; }
    else badge.style.display = 'none';

    var html = '<div class="filtro-row">'
      + '<input class="filtro-input" id="buscadorPedido" type="text" placeholder="🔍 Buscar código o cliente..." value="' + busquedaPedido + '" oninput="buscarPedido(this.value)" style="flex:1;min-width:180px">'
      + '</div>'
      + '<div class="filtro-row" style="margin-top:-6px">'
      + '<button class="filtro-btn ' + (filtroEstado==='todos'?'activo':'') + '" onclick="setFiltro(\'todos\',this)">Todos</button>'
      + '<button class="filtro-btn ' + (filtroEstado==='pendientes'?'activo':'') + '" onclick="setFiltro(\'pendientes\',this)">🔴 Pendientes</button>'
      + '<button class="filtro-btn ' + (filtroEstado==='Recibido'?'activo':'') + '" onclick="setFiltro(\'Recibido\',this)">Recibidos</button>'
      + '<button class="filtro-btn ' + (filtroEstado==='En preparación'?'activo':'') + '" onclick="setFiltro(\'En preparación\',this)">En prep.</button>'
      + '<button class="filtro-btn ' + (filtroEstado==='Listo para retirar'?'activo':'') + '" onclick="setFiltro(\'Listo para retirar\',this)">Listos</button>'
      + '<button class="filtro-btn ' + (filtroEstado==='Enviado'?'activo':'') + '" onclick="setFiltro(\'Enviado\',this)">Enviados</button>'
      + '<button class="filtro-btn ' + (filtroEstado==='Entregado'?'activo':'') + '" onclick="setFiltro(\'Entregado\',this)">Entregados</button>'
      + '<button class="filtro-btn ' + (filtroEstado==='Retirado'?'activo':'') + '" onclick="setFiltro(\'Retirado\',this)">Retirados</button>'
      + '</div><div id="listaPedidos"></div>';

    el.innerHTML = html;
    renderPedidos(pedidos);
    window._pedidosCache = pedidos;
    if (_lastPedidoCount < 0) _lastPedidoCount = pedidos.length;
  }).catch(function(){ el.innerHTML = '<div class="empty-txt">⚠️ No se pudo conectar.</div>'; });
}

function buscarPedido(val) {
  busquedaPedido = val;
  renderPedidos(window._pedidosCache || []);
}

function setFiltro(estado, btn) {
  filtroEstado = estado;
  document.querySelectorAll('.filtro-btn').forEach(function(b){ b.classList.remove('activo'); });
  btn.classList.add('activo');
  renderPedidos(window._pedidosCache || []);
}

function renderPedidos(pedidos) {
  var lista = document.getElementById('listaPedidos');
  if (!lista) return;

  // Filtro por estado
  var filtrados;
  if (filtroEstado === 'todos') filtrados = pedidos;
  else if (filtroEstado === 'pendientes') filtrados = pedidos.filter(function(p){ return p.estado==='Recibido'||p.estado==='En preparación'||p.estado==='Listo para retirar'||p.estado==='Enviado'; });
  else filtrados = pedidos.filter(function(p){ return p.estado === filtroEstado; });

  // Filtro por búsqueda (código, cliente, teléfono, productos)
  if (busquedaPedido.trim()) {
    var q = busquedaPedido.toLowerCase().trim();
    filtrados = filtrados.filter(function(p) {
      return (p.codigo||'').toLowerCase().indexOf(q) >= 0
        || (p.cliente||'').toLowerCase().indexOf(q) >= 0
        || (p.telefono||'').replace(/\D/g,'').indexOf(q.replace(/\D/g,'')) >= 0
        || (p.productos||'').toLowerCase().indexOf(q) >= 0;
    });
  }

  if (filtrados.length === 0) { lista.innerHTML = '<div class="empty-txt">No hay pedidos con este estado.</div>'; return; }

  var FINALES = ['Entregado','Retirado','Cancelado'];
  var html = '';
  filtrados.forEach(function(p) {
    var esFinal = FINALES.indexOf(p.estado) >= 0;
    var esEnvio = (p.entrega||'').toLowerCase().indexOf('env') >= 0;
    var prods = (p.productos || '').split(' | ').map(function(pr){ return '• ' + pr; }).join('<br>');
    html += '<div class="pedido-card" id="pc-' + p.codigo + '"' + (esFinal?' style="opacity:.6"':'') + '>'
      + '<div class="pedido-top">'
      + '<span class="pedido-codigo">' + p.codigo + '</span>'
      + '<span class="pedido-cliente">' + p.cliente + '</span>'
      + '<span class="badge ' + getBadgeClass(p.estado) + '">' + p.estado + '</span>'
      + '<span class="pedido-fecha">' + p.fecha + '</span>'
      + '</div>'
      + '<div class="pedido-info">'
      + '<span>📱 <strong>' + p.telefono + '</strong></span>'
      + '<span>💰 <strong>' + p.total + '</strong></span>'
      + '<span>🚚 <strong>' + p.entrega + '</strong></span>'
      + '<span>💳 <strong>' + p.pago + '</strong></span>'
      + '</div>'
      + '<div class="pedido-productos">' + prods + '</div>';

    // Botones de acción solo si no está finalizado
    if (!esFinal) {
      html += '<div class="pedido-actions">';
      if (p.estado === 'Recibido')
        html += '<button class="btn-estado btn-prep" onclick="cambiarEstado(\'' + p.codigo + '\',\'En preparación\')">🔧 En preparación</button>';
      if (p.estado === 'En preparación' && !esEnvio)
        html += '<button class="btn-estado btn-listo" onclick="cambiarEstado(\'' + p.codigo + '\',\'Listo para retirar\')">✅ Listo para retirar</button>';
      if (p.estado === 'En preparación' && esEnvio)
        html += '<button class="btn-estado btn-enviado" onclick="cambiarEstado(\'' + p.codigo + '\',\'Enviado\')">🚚 Enviado</button>';
      if (p.estado === 'Listo para retirar')
        html += '<button class="btn-estado btn-retirado" onclick="confirmarFinal(\'' + p.codigo + '\',\'Retirado\')">🤝 Retirado</button>';
      if (p.estado === 'Enviado')
        html += '<button class="btn-estado btn-entregado" onclick="confirmarFinal(\'' + p.codigo + '\',\'Entregado\')">📦 Entregado</button>';
      html += '<button class="btn-estado btn-cancelar" onclick="confirmarFinal(\'' + p.codigo + '\',\'Cancelado\')">❌ Cancelar</button>';
      html += '<a href="https://wa.me/54' + p.telefono.replace(/\D/g,'') + '?text=' + encodeURIComponent('Hola ' + p.cliente + '! Te escribimos de MAXUP sobre tu pedido ' + p.codigo + '.') + '" target="_blank" class="btn-estado btn-enviado">📲 WA</a>';
      html += '</div>';
    }

    html += '</div>';
  });
  lista.innerHTML = html;
}

function cambiarEstado(codigo, nuevoEstado) {
  showToast('Actualizando...');
  api('accion=admin_estado&pedido=' + encodeURIComponent(codigo) + '&estado=' + encodeURIComponent(nuevoEstado))
    .then(function(data) {
      if (data.ok) {
        showToast('✅ ' + codigo + ' → ' + nuevoEstado);
        logActivity('Cambio de estado', codigo + ' → ' + nuevoEstado);
        if (window._pedidosCache) {
          window._pedidosCache.forEach(function(p){ if(p.codigo===codigo) p.estado=nuevoEstado; });
          renderPedidos(window._pedidosCache);
        }
        // ── #1: NOTIFICACIÓN WHATSAPP AUTOMÁTICA AL CLIENTE ──
        var pedido = window._pedidosCache ? window._pedidosCache.find(function(p){ return p.codigo===codigo; }) : null;
        if(pedido && pedido.telefono){
          var mensajesEstado = {
            'Confirmado': '✅ ¡Tu pedido *'+codigo+'* fue confirmado! Lo estamos preparando. Te avisamos cuando esté listo.',
            'Preparando': '📦 Tu pedido *'+codigo+'* se está preparando. ¡Ya falta poco!',
            'Enviado': '🚚 ¡Tu pedido *'+codigo+'* fue enviado! Te mandamos el seguimiento a la brevedad.',
            'Listo para retirar': '🏪 Tu pedido *'+codigo+'* está listo para retirar en Calixto Gauna 1045, Gral. Güemes, Salta.',
            'Entregado': '🎉 ¡Pedido *'+codigo+'* entregado! Gracias por elegir MAXUP. ⭐ Si te gustó, contanos tu experiencia.',
            'Retirado': '🎉 ¡Pedido *'+codigo+'* retirado! Gracias por elegir MAXUP. ⭐ Si te gustó, contanos tu experiencia.',
            'Cancelado': '❌ Tu pedido *'+codigo+'* fue cancelado. Si tenés dudas, escribinos.'
          };
          var waMsg = mensajesEstado[nuevoEstado];
          if(waMsg){
            var tel = pedido.telefono.replace(/[^0-9]/g,'');
            if(tel.length < 10) tel = '54' + tel;
            var waUrl = 'https://wa.me/' + tel + '?text=' + encodeURIComponent(waMsg + '\n\n— MAXUP Suplementos 💪');
            if(confirm('¿Enviar notificación por WhatsApp al cliente?\n\nMensaje: ' + waMsg.replace(/\*/g,''))){
              window.open(waUrl, '_blank');
            }
          }
        }
      } else {
        showToast('❌ Error: ' + (data.error || 'No se pudo actualizar'));
      }
    }).catch(function(){ showToast('⚠️ Error de conexión'); });
}

// Confirmación antes de estados finales (descuentan stock o cancelan)
function confirmarFinal(codigo, nuevoEstado) {
  var msgs = {
    'Entregado': '📦 ¿Marcar ' + codigo + ' como ENTREGADO?\nEsto descontará el stock automáticamente.',
    'Retirado':  '🤝 ¿Marcar ' + codigo + ' como RETIRADO?\nEsto descontará el stock automáticamente.',
    'Cancelado': '❌ ¿Cancelar el pedido ' + codigo + '?\nEsta acción no se puede deshacer.'
  };
  if (confirm(msgs[nuevoEstado] || '¿Cambiar estado a ' + nuevoEstado + '?')) {
    cambiarEstado(codigo, nuevoEstado);
  }
}

function cargarStock() {
  var el = document.getElementById('tabStock');
  el.innerHTML = '<div class="loading-txt">Verificando stock...</div>';

    if (!data.ok) { el.innerHTML = '<div class="empty-txt">Error: ' + data.error + '</div>'; return; }

    if (prods.length === 0) {

    }
    var html = '<div class="section-title">Productos con ≤3 unidades <span>(' + prods.length + ')</span></div>';
    prods.forEach(function(p) {
      var cls = p.stock === 0 ? 'cero' : (p.stock <= 1 ? 'bajo' : 'ok');
      html += '<div class="stock-item">'
        + '<div><div class="stock-nombre">' + p.nombre + '</div><div class="stock-marca">' + p.marca + ' · ' + fmt(p.precio) + '</div></div>'
        + '<div class="stock-num ' + cls + '">' + p.stock + '</div>'
        + '</div>';
    });
    el.innerHTML = html;
  }).catch(function(){ el.innerHTML = '<div class="empty-txt">⚠️ No se pudo conectar.</div>'; });
}

// ── POR VENCER ───────────────────────────────────────────────
function cargarVencer() {
  var el = document.getElementById('tabVencer');
  el.innerHTML = '<div class="loading-txt">Verificando vencimientos...</div>';
  api('accion=admin_vencer&dias=70').then(function(data) {
    if (!data.ok) { el.innerHTML = '<div class="empty-txt">Error: ' + (data.error||'') + '</div>'; return; }
    var prods = data.productos || [];
    var criticos = prods.filter(function(p){ return p.diasRestantes <= 40; }).length;
    var badge = document.getElementById('badgeVencer');
    if (criticos > 0) { badge.textContent = criticos; badge.style.display='inline'; }
    else badge.style.display = 'none';

    if (prods.length === 0) {
      el.innerHTML = '<div class="empty-txt">✅ Todo bien — ningún producto vence en los próximos 70 días.</div>';
      return;
    }

    // Separar por urgencia
    var vencidos = prods.filter(function(p){ return p.diasRestantes < 0; });
    var criticosArr = prods.filter(function(p){ return p.diasRestantes >= 0 && p.diasRestantes <= 40; });
    var advertencia = prods.filter(function(p){ return p.diasRestantes > 40 && p.diasRestantes <= 50; });
    var atencion = prods.filter(function(p){ return p.diasRestantes > 50; });

    var html = '<div class="section-title">Productos por vencer <span>(' + prods.length + ')</span></div>'
      + '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;font-size:.78rem">'
      + (vencidos.length ? '<span style="color:#FF3D3D;font-weight:700">💀 '+vencidos.length+' vencidos</span>' : '')
      + (criticosArr.length ? '<span style="color:#FF3D3D;font-weight:700">🚨 '+criticosArr.length+' críticos (≤40d)</span>' : '')
      + (advertencia.length ? '<span style="color:#FFA500;font-weight:700">⚠️ '+advertencia.length+' advertencia (≤50d)</span>' : '')
      + (atencion.length ? '<span style="color:#00C8FF;font-weight:700">🔵 '+atencion.length+' atención (≤70d)</span>' : '')
      + '</div>';

    prods.forEach(function(p) {
      var color = p.diasRestantes < 0 ? '#FF3D3D' : p.diasRestantes <= 40 ? '#FF3D3D' : p.diasRestantes <= 50 ? '#FFA500' : '#00C8FF';
      var icon  = p.diasRestantes < 0 ? '💀' : p.diasRestantes <= 40 ? '🚨' : p.diasRestantes <= 50 ? '⚠️' : '🔵';
      var diasTxt = p.diasRestantes < 0 ? 'VENCIDO hace ' + Math.abs(p.diasRestantes) + ' días' : 'Vence en ' + p.diasRestantes + ' días (' + p.fechaVence + ')';
      html += '<div class="stock-item" style="border-left:3px solid ' + color + '">'
        + '<div style="font-size:1.3rem;width:28px">' + icon + '</div>'
        + '<div style="flex:1">'
        + '<div class="stock-nombre">' + p.nombre + '</div>'
        + '<div class="stock-marca">' + (p.marca||'') + ' · Stock: ' + p.stock + ' · $' + Number(p.precio).toLocaleString('es-AR') + '</div>'
        + '<div style="font-size:.78rem;color:' + color + ';font-weight:700;margin-top:2px">' + diasTxt + '</div>'
        + '</div>'
        + '</div>';
    });
    el.innerHTML = html;
  }).catch(function(){ el.innerHTML = '<div class="empty-txt">⚠️ No se pudo conectar.</div>'; });
}

    html += '<div style="background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:20px;margin-top:16px">'
      + '<div style="font-weight:700;font-size:.95rem;margin-bottom:12px">💾 Backup de datos</div>'
      + '<div style="color:var(--gray);font-size:.85rem;margin-bottom:14px">Descargá una copia de la hoja de Google Sheets para tener un respaldo.</div>'
      + '<a href="https://docs.google.com/spreadsheets/d/17rFBpuvjam54M3NGE8Pmtc9YwBBRhVYI8bgGpckiAXo/export?format=xlsx" target="_blank" class="filtro-btn" style="text-decoration:none;display:inline-block">📥 Descargar backup (.xlsx)</a>'
      + '<a href="https://docs.google.com/spreadsheets/d/17rFBpuvjam54M3NGE8Pmtc9YwBBRhVYI8bgGpckiAXo/export?format=csv" target="_blank" class="filtro-btn" style="text-decoration:none;display:inline-block;margin-left:8px">📄 Descargar CSV</a>'
      + '</div>';

    el.innerHTML = html;
  }).catch(function(){ el.innerHTML = '<div class="empty-txt">⚠️ No se pudo conectar.</div>'; });
}

function setMantMsg(msg) {
  var input = document.getElementById('mantMsgInput');
  if (input) input.value = msg;
}

function toggleMantenimiento(activar) {
  var msg = '';
  if (activar) {
    var input = document.getElementById('mantMsgInput');
    msg = input ? input.value.trim() : '';
    if (!msg) { msg = 'Estamos actualizando el catálogo. Volvemos en minutos.'; }
  }
  showToast(activar ? 'Activando mantenimiento...' : 'Desactivando...');
  api('accion=admin_mantenimiento&activo=' + (activar?'true':'false') + '&mensaje=' + encodeURIComponent(msg))
    .then(function(data) {
      if (data.ok) {
        _mantActivo = data.activo;
        showToast(data.activo ? '🔧 Mantenimiento ACTIVADO' : '✅ Mantenimiento DESACTIVADO');
        logActivity(data.activo ? 'Mantenimiento activado' : 'Mantenimiento desactivado', msg || 'Sin mensaje');
        actualizarBannerMant(data);
        if (tabActual === 'ajustes') cargarAjustes();
      } else {
        showToast('❌ Error: ' + (data.error||''));
      }
    }).catch(function(){ showToast('⚠️ Error de conexión'); });
}

function actualizarBannerMant(data) {
  var banner = document.getElementById('mantBanner');
  var bannerMsg = document.getElementById('mantBannerMsg');
  if (data.activo) {
    banner.style.display = 'block';
    bannerMsg.textContent = data.mensaje || 'En mantenimiento';
  } else {
    banner.style.display = 'none';
  }
}

// Chequear mantenimiento al iniciar
function _chequearMant() {
  api('accion=admin_mantenimiento').then(function(data){
    if(data.ok) actualizarBannerMant(data);
  }).catch(function(){});
}

// ── DASHBOARD (estadísticas con gráfico) ────────────────────
function cargarDashboard() {
  var el = document.getElementById('tabDashboard');
  el.innerHTML = '<div class="loading-txt">Cargando estadísticas...</div>';
  api('accion=admin_dashboard').then(function(data) {
    if (!data.ok) { el.innerHTML = '<div class="empty-txt">Error: ' + (data.error||'Endpoint no disponible aún') + '</div>'; return; }

    var html = '<div class="section-title">📈 <span>Dashboard de ventas</span></div>';

    // Stats generales
    html += '<div class="stats-grid">'
      + '<div class="stat-card"><div class="stat-label">Ventas esta semana</div><div class="stat-val cyan">' + fmt(data.semana||0) + '</div></div>'
      + '<div class="stat-card"><div class="stat-label">Ventas este mes</div><div class="stat-val green">' + fmt(data.mes||0) + '</div></div>'
      + '<div class="stat-card"><div class="stat-label">Pedidos este mes</div><div class="stat-val pink">' + (data.pedidosMes||0) + '</div></div>'
      + '<div class="stat-card"><div class="stat-label">Ticket promedio mes</div><div class="stat-val" style="color:var(--orange)">' + fmt(data.ticketProm||0) + '</div></div>'
      + '</div>';

    // Top productos
    if(data.topProductos && data.topProductos.length > 0){
      html += '<div class="section-title" style="margin-top:20px">🏆 <span>Productos más vendidos (mes)</span></div>'
        + '<div style="background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px">';
      data.topProductos.forEach(function(p, i){
        var medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '+(i+1)+'.';
        html += '<div class="venta-item"><div><div class="venta-prod">' + medal + ' ' + p.nombre + '</div>'
          + '<div class="venta-cli">' + p.cantidad + ' vendidos · ' + (p.marca||'') + '</div></div>'
          + '<div class="venta-monto">' + fmt(p.total) + '</div></div>';
      });
      html += '</div>';
    }

    // Top marcas
    if(data.topMarcas && data.topMarcas.length > 0){
      html += '<div class="section-title" style="margin-top:20px">🏅 <span>Marcas más vendidas (mes)</span></div>'
        + '<div style="background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px">';
      data.topMarcas.forEach(function(m){
        html += '<div class="venta-item"><div class="venta-prod">' + m.marca + '</div>'
          + '<div class="venta-monto">' + fmt(m.total) + '</div></div>';
      });
      html += '</div>';
    }

    // Gráfico de barras simple (últimos 7 días)
    if(data.ultimos7 && data.ultimos7.length > 0){
      var max = Math.max.apply(null, data.ultimos7.map(function(d){return d.total;})) || 1;
      html += '<div class="section-title" style="margin-top:20px">📊 <span>Últimos 7 días</span></div>'
        + '<div style="background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px;display:flex;gap:6px;align-items:flex-end;height:180px">';
      data.ultimos7.forEach(function(d){
        var pct = Math.max(5, Math.round(d.total/max*100));
        html += '<div style="flex:1;text-align:center">'
          + '<div style="font-size:.65rem;color:var(--cyan);font-weight:700;margin-bottom:4px">' + fmt(d.total) + '</div>'
          + '<div style="height:' + pct + '%;background:linear-gradient(to top,var(--cyan),var(--pink));border-radius:4px 4px 0 0;min-height:4px;transition:height .5s"></div>'
          + '<div style="font-size:.65rem;color:var(--gray);margin-top:4px">' + d.dia + '</div>'
          + '</div>';
      });
      html += '</div>';
    }

    el.innerHTML = html;
  }).catch(function(){ el.innerHTML = '<div class="empty-txt">⚠️ No se pudo conectar. Esta función requiere actualizar la API.</div>'; });
}

// ── LOG DE ACTIVIDAD ────────────────────────────────────────
var _activityLog = [];

function logActivity(accion, detalle) {
  _activityLog.unshift({
    fecha: new Date().toLocaleString('es-AR'),
    accion: accion,
    detalle: detalle
  });
  // Mantener máximo 100 entradas
  if(_activityLog.length > 100) _activityLog.length = 100;
  try{ localStorage.setItem('maxup_admin_log', JSON.stringify(_activityLog)); }catch(e){}
}

function cargarLog() {
  // Cargar desde localStorage
  try{
    var saved = localStorage.getItem('maxup_admin_log');
    if(saved) _activityLog = JSON.parse(saved);
  }catch(e){}

  var el = document.getElementById('tabLog');
  if(_activityLog.length === 0){
    el.innerHTML = '<div class="empty-txt">No hay actividad registrada todavía.<br>Las acciones (cambios de estado, mantenimiento, etc.) se registrarán aquí.</div>';
    return;
  }

  var html = '<div class="section-title">📋 <span>Registro de actividad</span></div>'
    + '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="filtro-btn" onclick="limpiarLog()">🗑️ Limpiar log</button></div>';

  _activityLog.forEach(function(entry){
    var icon = entry.accion.indexOf('estado')>=0 ? '📦' : entry.accion.indexOf('mant')>=0 ? '🔧' : entry.accion.indexOf('login')>=0 ? '🔑' : '📝';
    html += '<div style="background:var(--dark2);border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;gap:10px;align-items:center">'
      + '<span style="font-size:1.2rem">' + icon + '</span>'
      + '<div style="flex:1"><div style="font-size:.88rem;font-weight:600">' + entry.accion + '</div>'
      + '<div style="font-size:.78rem;color:var(--gray)">' + entry.detalle + '</div></div>'
      + '<div style="font-size:.72rem;color:var(--gray);white-space:nowrap">' + entry.fecha + '</div>'
      + '</div>';
  });

  el.innerHTML = html;
}

function limpiarLog(){
  if(!confirm('¿Limpiar todo el registro de actividad?')) return;
  _activityLog = [];
  try{ localStorage.removeItem('maxup_admin_log'); }catch(e){}
  cargarLog();
  showToast('🗑️ Log limpiado');
}
</script>

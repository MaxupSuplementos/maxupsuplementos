<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indumentaria Deportiva — MAXUP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--s1:#111;--s2:#161616;--bdr:rgba(255,255,255,.08);--cyan:#00C8FF;--pink:#FF0099;--green:#00FF88;--white:#f0f0f0;--gray:#888;--grad:linear-gradient(135deg,var(--cyan),var(--pink))}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:"DM Sans",sans-serif;min-height:100vh}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:16px;padding:0 24px;height:56px}
.nav-brand{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:.1em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-links{display:flex;gap:20px;list-style:none;margin-left:auto}
.nav-links a{color:var(--gray);text-decoration:none;font-size:.84rem;font-weight:600;letter-spacing:.05em;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-links a.active{color:var(--cyan)}
.hero{padding:40px 24px 24px;text-align:center;max-width:1400px;margin:0 auto}
.hero-lbl{font-size:.7rem;font-weight:700;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;margin-bottom:8px}
.hero-t{font-family:"Bebas Neue",sans-serif;font-size:clamp(2.5rem,8vw,4.5rem);letter-spacing:.06em;line-height:1;margin-bottom:8px}
.hero-d{color:var(--gray);font-size:.88rem}
.wrap{max-width:1400px;margin:0 auto;padding:0 24px}
/* BUSQUEDA */
.search-wrap{position:relative;margin:20px 0 0}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--gray);fill:none;stroke-width:2;pointer-events:none}
.search-input{width:100%;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:11px 14px 11px 40px;color:var(--white);font-size:.88rem;font-family:"DM Sans",sans-serif;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--cyan)}
.search-input::placeholder{color:#444}
/* FILTROS */
.flbl{font-size:.67rem;font-weight:700;letter-spacing:.15em;color:var(--gray);text-transform:uppercase;margin:18px 0 7px}
.frow{display:flex;flex-wrap:wrap;gap:7px}
.ftag{background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--gray);padding:6px 14px;border-radius:20px;font-size:.77rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:"DM Sans",sans-serif}
.ftag:hover{border-color:rgba(0,200,255,.4);color:var(--white)}
.ftag.on{background:var(--cyan);border-color:var(--cyan);color:#000}
.ftag.mon{background:rgba(255,184,0,.15);border-color:#FFB800;color:#FFB800}
.info{color:var(--gray);font-size:.78rem;margin:14px 0 4px}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:13px;margin-top:12px}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:border-color .2s,transform .2s}
.card:hover{border-color:rgba(0,200,255,.4);transform:translateY(-2px)}
.cimg{width:100%;aspect-ratio:1;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;overflow:hidden;position:relative}
.cimg img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .cimg img{transform:scale(1.04)}
.cbody{padding:11px;display:flex;flex-direction:column;gap:4px;flex:1}
.cmarca{font-size:.63rem;font-weight:700;letter-spacing:.1em;color:#FFB800;text-transform:uppercase}
.ccat{font-size:.63rem;font-weight:700;letter-spacing:.07em;color:var(--cyan);text-transform:uppercase}
.cnombre{font-size:.83rem;font-weight:600;color:var(--white);line-height:1.3}
.ccodigo{font-size:.67rem;color:#444}
.cprecio{font-size:1rem;font-weight:800;color:var(--cyan);margin-top:3px}
.ctarjeta{font-size:.68rem;color:#555}
.cvars{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.cpill{border:1px solid;padding:2px 6px;border-radius:5px;font-size:.66rem;font-weight:600}
.cpill.ago{opacity:.3;text-decoration:line-through}
.cstock{font-size:.68rem;padding:2px 7px;border-radius:10px;width:fit-content;margin-top:3px}
.cstock.ok{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2)}
.cstock.last{background:rgba(255,165,0,.1);color:#FFA500;border:1px solid rgba(255,165,0,.25)}
.cbtn{margin-top:auto;padding:8px 10px;background:var(--grad);color:#000;border:none;border-radius:8px;font-size:.76rem;font-weight:700;cursor:pointer;width:100%;font-family:"DM Sans",sans-serif;transition:opacity .2s}
.cbtn:hover{opacity:.85}
/* PAG */
.pagwrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:28px 24px 16px}
.pbtn{background:rgba(255,255,255,.07);border:1px solid var(--bdr);color:var(--gray);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s;font-family:"DM Sans",sans-serif}
.pbtn:hover{border-color:var(--cyan);color:var(--cyan)}
.pbtn.on{background:var(--cyan);border-color:var(--cyan);color:#000;font-weight:700}
.pinfo{color:#555;font-size:.76rem;margin-left:4px}
.empty{text-align:center;padding:60px 24px;color:var(--gray)}
/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex}
.mbox{background:#141414;border:1px solid rgba(0,200,255,.2);border-radius:16px;max-width:500px;width:100%;padding:26px;position:relative;max-height:90vh;overflow-y:auto}
.mclose{position:absolute;top:13px;right:15px;background:none;border:none;color:var(--gray);font-size:1.3rem;cursor:pointer;transition:color .2s}
.mclose:hover{color:var(--white)}
.mmarca{font-size:.67rem;font-weight:700;letter-spacing:.12em;color:#FFB800;text-transform:uppercase;margin-bottom:3px}
.mnombre{font-family:"Bebas Neue",sans-serif;font-size:1.65rem;letter-spacing:.05em;line-height:1.1;margin-bottom:3px}
.mcodigo{font-size:.7rem;color:#555;margin-bottom:12px}
.mprecios{margin-bottom:16px}
.mprecio{font-size:1.4rem;font-weight:800;color:var(--cyan)}
.mtarjeta{font-size:.78rem;color:#555}
.msect{font-size:.68rem;font-weight:700;letter-spacing:.13em;color:var(--gray);text-transform:uppercase;margin-bottom:8px}
.mtalles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.mtalle{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);color:var(--white);padding:10px 14px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:"DM Sans",sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:70px;text-align:center}
.mtalle:hover{border-color:var(--cyan)}
.mtalle.sel{background:rgba(0,200,255,.12);border-color:var(--cyan);color:var(--cyan)}
.mtalle.ago{opacity:.28;text-decoration:line-through;cursor:not-allowed;pointer-events:none}
.mtalle small{font-size:.62rem;color:#666;font-weight:400}
.mtalle.sel small{color:rgba(0,200,255,.6)}
.mwabtn{width:100%;background:var(--grad);color:#000;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .2s;font-family:"DM Sans",sans-serif}
.mwabtn:hover{opacity:.88}
.maviso{font-size:.72rem;color:#444;text-align:center;margin-top:8px}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr);gap:9px}.nav-links{display:none}}

/* ── GALERÍA DE FOTOS ─────────────────────────── */
.card-img-wrap{position:relative;overflow:hidden;background:#1a1a2e;
  height:220px;display:flex;align-items:center;justify-content:center}
.card-img-wrap img{width:100%;height:100%;object-fit:contain;padding:10px;transition:opacity .3s}
.gal-slide{display:none;width:100%;height:100%;position:absolute;top:0;left:0;
  align-items:center;justify-content:center}
.gal-slide.active{display:flex}
.gal-slide img{width:100%;height:100%;object-fit:contain;padding:10px}
.gal-btn-i{position:absolute;top:50%;transform:translateY(-50%);
  width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(0,0,0,.6);color:#fff;font-size:1rem;z-index:10;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,opacity .2s;opacity:0}
.card-img-wrap:hover .gal-btn-i{opacity:1}
.gal-btn-i.prev-i{left:6px}
.gal-btn-i.next-i{right:6px}
.gal-dots-i{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;z-index:10}
.gal-dot-i{width:6px;height:6px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.4);padding:0;transition:background .2s}
.gal-dot-i.active{background:#fff}
.gal-counter-i{position:absolute;top:6px;right:8px;font-size:.65rem;
  color:#fff;background:rgba(0,0,0,.5);padding:2px 6px;border-radius:10px;z-index:10}
</style>
</head>

</div>

function galMoveI(id, dir, e) {
  e && e.stopPropagation();
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var slides = wrap.querySelectorAll('.gal-slide');
  var dots = wrap.querySelectorAll('.gal-dot-i');
  var counter = wrap.querySelector('.gal-counter-i');
  var cur = 0;
  slides.forEach(function(s,i){ if(s.classList.contains('active')) cur=i; });
  slides[cur].classList.remove('active');
  if(dots[cur]) dots[cur].classList.remove('active');
  cur = (cur + dir + slides.length) % slides.length;
  slides[cur].classList.add('active');
  if(dots[cur]) dots[cur].classList.add('active');
  if(counter) counter.textContent = (cur+1) + ' / ' + slides.length;
}
function galGoI(id, idx, e) {
  e && e.stopPropagation();
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var slides = wrap.querySelectorAll('.gal-slide');
  var dots = wrap.querySelectorAll('.gal-dot-i');
  var counter = wrap.querySelector('.gal-counter-i');
  slides.forEach(function(s){ s.classList.remove('active'); });
  dots.forEach(function(d){ d.classList.remove('active'); });
  if(slides[idx]) slides[idx].classList.add('active');
  if(dots[idx]) dots[idx].classList.add('active');
  if(counter) counter.textContent = (idx+1) + ' / ' + slides.length;
}

function cdot(c){
  var m={'NEGRO':'#333','BLANCO':'#ddd','ROJO':'#e53','ROSA':'#f4a','ROSADO':'#f7b','FUCSIA':'#f06','LILA':'#b8f','VIOLETA':'#96f','MORADO':'#73c','AZUL':'#38f','CELESTE':'#5cf','VERDE PINO':'#2a5','VERDE AGUA':'#0d9','VERDE LIMA':'#9f0','VERDE MANZANA':'#7d0','VERDE':'#4c8','NARANJA':'#f80','AMARILLO':'#fe0','TURQUESA':'#0cd','MARRON':'#964','CHOCOLATE':'#7B3F00','GRIS':'#888','BEIGE':'#d9c'};
  var cu=(c||'').toUpperCase();
  for(var k in m){if(cu.indexOf(k)>=0)return m[k];}
  return '#666';
}

function getFil(){
  var q=busqA.toLowerCase().replace('#','');
  return PRODS.filter(function(p){
    var matchCat=catA==='all'||p.cat===catA;
    var matchMarca=marcaA==='all'||p.marca===marcaA;
    var matchQ=!q||(p.nombre.toLowerCase().indexOf(q)>=0)||(p.marca.toLowerCase().indexOf(q)>=0)||((p.codigo||'').toLowerCase().replace('#','').indexOf(q)>=0);
    return matchCat&&matchMarca&&matchQ;
  });
}

function proxyImg(url){
  if(!url) return '';
  if(url.indexOf('weserv.nl')!==-1) return url;
  var clean=url.replace('https://','').replace('http://','');
  return 'https://images.weserv.nl/?url='+clean+'&w=400&output=webp&q=82';
}
function render(){
  var grid=document.getElementById('grid');
  if(!grid)return;
  var lista=getFil();
  var tot=Math.ceil(lista.length/PPP)||1;
  if(pag>tot)pag=1;
  var sl=lista.slice((pag-1)*PPP,pag*PPP);
  document.getElementById('info').textContent=lista.length+' prenda'+(lista.length!==1?'s':'')+' disponibles';
  if(!lista.length){
    grid.innerHTML='<div class="empty"><p style="font-size:2.5rem">&#128085;</p><p style="margin-top:12px">No se encontraron prendas.</p></div>';
    document.getElementById('pag').innerHTML='';
    return;
  }
  grid.innerHTML=sl.map(function(p){
    var idx=PRODS.indexOf(p);
    var galId='gi-'+idx;
    var imgs=p.imgs&&p.imgs.length?p.imgs.map(proxyImg):(p.img?[proxyImg(p.img)]:[]);
    var hasMulti=imgs.length>1;
    var img='';
    if(imgs.length===0){
      img='<span style="font-size:3rem">&#128085;</span>';
    } else if(!hasMulti){
      img='<img src="'+imgs[0]+'" alt="'+p.nombre+'" loading="lazy">';
    } else {
      var slides=imgs.map(function(u,si){
        return '<div class="gal-slide'+(si===0?' active':'')+'"><img src="'+u+'" alt="'+p.nombre+'" loading="'+(si===0?'eager':'lazy')+'"></div>';
      }).join('');
      var dots=imgs.map(function(_,si){
        return '<button class="gal-dot-i'+(si===0?' active':'')+'" onclick="galGoI(''+galId+'','+si+',event)"></button>';
      }).join('');
      img='<div id="'+galId+'" style="position:relative;width:100%;height:100%">'+slides+
          '<button class="gal-btn-i prev-i" onclick="galMoveI(''+galId+'',-1,event)">&#8249;</button>'+
          '<button class="gal-btn-i next-i" onclick="galMoveI(''+galId+'',1,event)">&#8250;</button>'+
          '<div class="gal-dots-i">'+dots+'</div>'+
          '<div class="gal-counter-i">1 / '+imgs.length+'</div>'+
          '</div>';
    }
    var pills=(p.variantes||[]).map(function(v){
      var dot=cdot(v.color);
      return'<span class="cpill'+(v.stock===0?' ago':'')+'" style="color:'+dot+';border-color:'+dot+'40;background:'+dot+'18">'+v.talle+'</span>';
    }).join('');
    var last=p.stock===1;
    return'<div class="card" onclick="aModal('+idx+')">'
      +'<div class="cimg card-img-wrap">'+img+'</div>'
      +'<div class="cbody">'
      +(p.marca?'<div class="cmarca">'+p.marca+'</div>':'')
      +'<div class="ccat">'+p.cat+'</div>'
      +'<div class="cnombre">'+p.nombre+'</div>'
      +(p.codigo?'<div class="ccodigo">#'+p.codigo+'</div>':'')
      +'<div class="cprecio">$'+p.precio.toLocaleString('es-AR')+'</div>'
      +'<div class="ctarjeta">Tarjeta $'+(p.precio_lista||Math.round(p.precio*1.06)).toLocaleString('es-AR')+'</div>'
      +'<div class="cvars">'+pills+'</div>'
      +'<div class="cstock '+(last?'last':'ok')+'">'+(last?'&#161;&#218;ltima!':p.stock+' disp.')+'</div>'
      +'<button class="cbtn">Ver talles</button>'
      +'</div></div>';
  }).join('');
  renderPag(lista.length);
}

function renderPag(total){
  var cont=document.getElementById('pag');
  var tot=Math.ceil(total/PPP);
  if(tot<=1){cont.innerHTML='';return;}
  var h='';
  if(pag>1)h+='<button class="pbtn" onclick="irP('+(pag-1)+')">&#8592;</button>';
  for(var i=1;i<=tot;i++)h+='<button class="pbtn'+(i===pag?' on':'')+'" onclick="irP('+i+')">'+i+'</button>';
  if(pag<tot)h+='<button class="pbtn" onclick="irP('+(pag+1)+')">&#8594;</button>';
  h+='<span class="pinfo">P&aacute;g. '+pag+'/'+tot+' &middot; '+total+' prendas</span>';
  cont.innerHTML=h;
}

function irP(n){pag=n;render();window.scrollTo({top:0,behavior:'smooth'});}

function buscar(q){busqA=q;pag=1;render();}

function fil(tipo,val){
  if(tipo==='cat'){
    catA=val;pag=1;
    document.querySelectorAll('#fCat .ftag').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-v')===val);});
  }else{
    marcaA=val;pag=1;
    document.querySelectorAll('#fMarca .ftag').forEach(function(b){
      b.classList.toggle('on',b.getAttribute('data-v')===val);
      b.classList.toggle('mon',b.getAttribute('data-v')===val&&val!=='all');
    });
  }
  render();
}

  var marcas=[];
  PRODS.forEach(function(p){if(p.marca&&marcas.indexOf(p.marca)<0)marcas.push(p.marca);});
  marcas.sort();
  var cont=document.getElementById('fMarca');
  cont.innerHTML='';
  function mk(v,lbl,isOn,esMarca){
    var b=document.createElement('button');
    b.className='ftag'+(isOn?' on':'')+(isOn&&esMarca?' mon':'');
    b.setAttribute('data-v',v);
    b.textContent=lbl;
    b.onclick=function(){fil('marca',v);};
    cont.appendChild(b);
  }
  mk('all','Todas las marcas',true,false);
  marcas.forEach(function(m){mk(m,m,false,true);});
}

function aModal(idx){
  var p=PRODS[idx];
  if(!p)return;
  mProd=p;mSel=null;
  // Imagen / galería en el modal
  var imgWrap=document.getElementById('mImgWrap');
  if(imgWrap){
    var imgs=p.imgs&&p.imgs.length?p.imgs.map(proxyImg):(p.img?[proxyImg(p.img)]:[]);
    if(imgs.length===0){
      imgWrap.innerHTML='<span style="font-size:4rem">&#128085;</span>';
    } else if(imgs.length===1){
      imgWrap.innerHTML='<img src="'+imgs[0]+'" alt="'+p.nombre+'" style="width:100%;max-height:280px;object-fit:contain;padding:10px">';
    } else {
      var slides=imgs.map(function(u,si){
        return '<div class="gal-slide'+(si===0?' active':'')+'" style="position:absolute;top:0;left:0;width:100%;height:100%;display:'+(si===0?'flex':'none')+';align-items:center;justify-content:center"><img src="'+u+'" alt="'+p.nombre+'" style="max-width:100%;max-height:280px;object-fit:contain;padding:10px"></div>';
      }).join('');
      imgWrap.style.height='280px';
      imgWrap.innerHTML='<div id="mGal" style="position:relative;width:100%;height:100%">'+slides+
        '<button class="gal-btn-i prev-i" onclick="galMoveI('mGal',-1,event)" style="opacity:1">&#8249;</button>'+
        '<button class="gal-btn-i next-i" onclick="galMoveI('mGal',1,event)" style="opacity:1">&#8250;</button>'+
        '<div class="gal-counter-i" style="opacity:1">1 / '+imgs.length+'</div>'+
        '</div>';
    }
  }
  document.getElementById('mMarca').textContent=p.marca||'';
  document.getElementById('mNombre').textContent=p.nombre;
  document.getElementById('mCodigo').textContent=p.codigo?'Código: #'+p.codigo:'';
  document.getElementById('mPrecio').textContent='$'+p.precio.toLocaleString('es-AR')+' efectivo';
  document.getElementById('mTarjeta').textContent='Tarjeta: $'+(p.precio_lista||Math.round(p.precio*1.06)).toLocaleString('es-AR');
  var cont=document.getElementById('mTalles');
  cont.innerHTML='';
  var disp=(p.variantes||[]).filter(function(v){return v.stock>0;});
  (p.variantes||[]).forEach(function(v){
    var b=document.createElement('button');
    b.className='mtalle'+(v.stock===0?' ago':'');
    var dot=cdot(v.color);
    b.innerHTML='<span style="color:'+dot+';font-size:1rem">&#9679;</span>'
      +'<strong>'+v.talle+'</strong>'
      +(v.color&&v.color!==v.talle?'<small>'+v.color+'</small>':'')
      +'<small>'+v.stock+' ud.</small>';
    if(v.stock>0){
      b.onclick=(function(tv){return function(){
        mSel=tv;
        cont.querySelectorAll('.mtalle').forEach(function(x){x.classList.remove('sel');});
        b.classList.add('sel');
      };})(v);
    }
    cont.appendChild(b);
  });
  if(disp.length===1){
    mSel=disp[0];
    var btn=cont.querySelector('.mtalle:not(.ago)');
    if(btn)btn.classList.add('sel');
  }
  document.getElementById('mbg').classList.add('open');
  document.body.style.overflow='hidden';
}

function bgClick(e){if(e.target===document.getElementById('mbg'))cModal();}
function cModal(){document.getElementById('mbg').classList.remove('open');document.body.style.overflow='';}

function waConsultar(){
  if(!mProd)return;
  var disp=(mProd.variantes||[]).filter(function(v){return v.stock>0;});
  if(!mSel&&disp.length>1){alert('Por favor elegí un talle antes de consultar.');return;}
  var sel=mSel||disp[0];
  var msg='Hola MAXUP! Me interesa esta prenda:'
    +(mProd.codigo?'\nCódigo: #'+mProd.codigo:'')
    +'\n👗 '+mProd.nombre
    +(mProd.marca?'\n🏷️ Marca: '+mProd.marca:'')
    +'\n📏 Talle: '+sel.talle
    +(sel.color&&sel.color!==sel.talle?'\n🎨 Color: '+sel.color:'')
    +'\n💰 Precio: $'+mProd.precio.toLocaleString('es-AR')
    +'\n\n¿Está disponible?';
  window.open('https://wa.me/5491168461457?text='+encodeURIComponent(msg),'_blank');
}

// Cargar desde Sheets (solo si estructura compatible)
async function cargarSheets(){
  try{
    var r=await fetch(API+'?accion=indumentaria');
    if(!r.ok)return;
    var d=await r.json();
    if(!d.ok||!d.prendas||d.prendas.length===0)return;
    var p0=d.prendas[0];
    if(!p0.variantes&&!p0.talles)return;
    PRODS=d.prendas;
    buildMarcas();
    render();
  }catch(e){}
}

buildMarcas();
render();
setTimeout(cargarSheets,2000);
</script>

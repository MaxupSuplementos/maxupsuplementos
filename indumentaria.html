<style>
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #161616;
  --border: rgba(255,255,255,.08);
  --cyan: #00C8FF;
  --pink: #FF0099;
  --green: #00FF88;
  --white: #f0f0f0;
  --gray: #888;
  --grad: linear-gradient(135deg, var(--cyan), var(--pink));
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; }

/* NAV */
.nav { position:sticky; top:0; z-index:100; background:rgba(10,10,10,.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; padding:0 24px; height:56px; }
.nav-brand { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:.1em; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-decoration:none; }
.nav-links { display:flex; gap:20px; list-style:none; margin-left:auto; }
.nav-links a { color:var(--gray); text-decoration:none; font-size:.84rem; font-weight:600; letter-spacing:.05em; transition:color .2s; }
.nav-links a:hover { color:var(--white); }
.nav-links a.active { color:var(--cyan); }

/* HERO */
.hero { padding:60px 24px 40px; text-align:center; max-width:1400px; margin:0 auto; }
.hero-label { font-size:.75rem; font-weight:700; letter-spacing:.2em; color:var(--cyan); text-transform:uppercase; margin-bottom:12px; }
.hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.5rem,8vw,5rem); letter-spacing:.06em; line-height:1; margin-bottom:12px; }
.hero-desc { color:var(--gray); font-size:.92rem; max-width:500px; margin:0 auto; }

/* FILTROS */
.filtros-wrap { max-width:1400px; margin:0 auto; padding:0 24px; }
.filtros-label { font-size:.7rem; font-weight:700; letter-spacing:.15em; color:var(--gray); text-transform:uppercase; margin:24px 0 8px; }
.filtros { display:flex; flex-wrap:wrap; gap:8px; }
.filtro { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--gray); padding:7px 16px; border-radius:20px; font-size:.8rem; font-weight:600; cursor:pointer; transition:all .2s; letter-spacing:.04em; font-family:'DM Sans',sans-serif; }
.filtro:hover { border-color:rgba(0,200,255,.4); color:var(--white); }
.filtro.activo { background:var(--cyan); border-color:var(--cyan); color:#000; }
.filtro-marca.activo { background:rgba(255,184,0,.15); border-color:#FFB800; color:#FFB800; }

/* RESULTADOS */
.resultados-info { max-width:1400px; margin:20px auto 0; padding:0 24px; color:var(--gray); font-size:.82rem; }

/* GRID */
.grid-wrap { max-width:1400px; margin:16px auto 0; padding:0 24px; }
.indum-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; }

/* CARD */
.indum-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; transition:border-color .2s, transform .2s; }
.indum-card:hover { border-color:rgba(0,200,255,.35); transform:translateY(-2px); }
.indum-img { width:100%; aspect-ratio:1; background:var(--surface2); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:2.5rem; }
.indum-img img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
.indum-card:hover .indum-img img { transform:scale(1.04); }
.indum-body { padding:12px; display:flex; flex-direction:column; gap:5px; flex:1; }
.indum-cat { font-size:.65rem; font-weight:700; letter-spacing:.1em; color:var(--cyan); text-transform:uppercase; }
.indum-nombre { font-size:.84rem; font-weight:600; color:var(--white); line-height:1.3; }
.indum-color { font-size:.75rem; color:var(--gray); display:flex; align-items:center; gap:5px; margin-top:2px; }
.indum-color::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--dot-color,#888); flex-shrink:0; }
.indum-precio { font-size:1.05rem; font-weight:800; color:var(--cyan); margin-top:4px; }
.indum-tarjeta { font-size:.72rem; color:#555; }
.indum-stock { font-size:.7rem; padding:2px 8px; border-radius:10px; width:fit-content; margin-top:2px; }
.indum-stock.ok { background:rgba(0,255,136,.08); color:var(--green); border:1px solid rgba(0,255,136,.2); }
.indum-stock.last { background:rgba(255,165,0,.1); color:#FFA500; border:1px solid rgba(255,165,0,.25); }
.indum-btn { margin-top:auto; padding-top:4px; background:var(--grad); color:#000; border:none; border-radius:8px; padding:9px 10px; font-size:.78rem; font-weight:700; cursor:pointer; letter-spacing:.04em; transition:opacity .2s; width:100%; font-family:'DM Sans',sans-serif; }
.indum-btn:hover { opacity:.85; }

/* PAGINACIÓN */
.paginacion { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; align-items:center; padding:32px 24px 16px; max-width:1400px; margin:0 auto; }
.pag-btn { background:rgba(255,255,255,.07); border:1px solid var(--border); color:var(--gray); padding:8px 14px; border-radius:8px; cursor:pointer; font-size:.82rem; transition:all .2s; font-family:'DM Sans',sans-serif; }
.pag-btn:hover { border-color:var(--cyan); color:var(--cyan); }
.pag-activo { background:var(--cyan)!important; border-color:var(--cyan)!important; color:#000!important; font-weight:700; }
.pag-info { color:#555; font-size:.78rem; margin-left:4px; }

/* EMPTY */
.empty { text-align:center; padding:60px 24px; color:var(--gray); }
.empty-icon { font-size:3rem; margin-bottom:12px; }

/* MOBILE */
@media(max-width:600px) {
  .indum-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
  .nav-links { display:none; }
}
</style>
</head>

var catActiva = 'all';
var marcaActiva = 'all';
var pagina = 1;
var POR_PAG = 24;
var API_URL = 'https://script.google.com/macros/s/AKfycbwUujcSoSyBWLLla-LOdovJmTDan-DP3O9Gp0k_MSupTHGEPB55TCZqllvGmEK6vlk/exec';

function colorDot(c) {
  var m = {'NEGRO':'#222','BLANCO':'#eee','ROJO':'#e53','ROSA':'#f4a','ROSADO':'#f7b','FUCSIA':'#f06','LILA':'#b8f','VIOLETA':'#96f','MORADO':'#73c','AZUL':'#38f','CELESTE':'#5cf','VERDE PINO':'#2a5','VERDE':'#4c8','VERDE LIMA':'#9f0','VERDE MANZANA':'#7d0','VERDE AGUA':'#0d9','NARANJA':'#f80','AMARILLO':'#fe0','TURQUESA':'#0cd','MARRON':'#964','CHOCOLATE':'#7B3F00','GRIS':'#888','BEIGE':'#d9c','ANIMAL PRINT':'#a63'};
  var cu = (c||'').toUpperCase();
  for(var k in m){ if(cu.indexOf(k)>=0) return m[k]; }
  return '#888';
}

function getFiltrados() {
  return PRODS.filter(function(p){
    return (catActiva==='all'||p.cat===catActiva) && (marcaActiva==='all'||p.marca===marcaActiva);
  });
}

function render() {
  var grid = document.getElementById('grid');
  var lista = getFiltrados();
  var totalPags = Math.ceil(lista.length / POR_PAG) || 1;
  if(pagina > totalPags) pagina = 1;
  var slice = lista.slice((pagina-1)*POR_PAG, pagina*POR_PAG);

  document.getElementById('infoResultados').textContent = lista.length + ' prenda' + (lista.length!==1?'s':'') + ' disponibles';

  if(!lista.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">&#128085;</div><p>No hay prendas en esta categoría.</p></div>';
    document.getElementById('paginacion').innerHTML = '';
    return;
  }

  grid.innerHTML = slice.map(function(p){
    var dot = colorDot(p.color);
    var last = p.stock === 1;
    var tarjeta = p.precio_lista || Math.round(p.precio * 1.06);
    var img = p.img
      ? '<img src="'+p.img+'" alt="'+p.nombre+'" loading="lazy">'
      : '&#128085;';
    return '<div class="indum-card">'
      +'<div class="indum-img">'+img+'</div>'
      +'<div class="indum-body">'
      +'<div class="indum-cat">'+p.cat+(p.marca?' &middot; '+p.marca:'')+'</div>'
      +'<div class="indum-nombre">'+p.nombre+'</div>'
      +'<div class="indum-color" style="--dot-color:'+dot+'">'+p.color+'</div>'
      +'<div class="indum-precio">$'+p.precio.toLocaleString('es-AR')+'</div>'
      +'<div class="indum-tarjeta">Tarjeta $'+tarjeta.toLocaleString('es-AR')+'</div>'
      +'<div class="indum-stock '+(last?'last':'ok')+'">'+(last?'&#161;&#218;ltima unidad!':p.stock+' disponibles')+'</div>'
      +'<button class="indum-btn" data-n="'+p.nombre.replace(/"/g,"'")+'" data-c="'+p.color+'" data-p="'+p.precio+'" onclick="consultarBtn(this)">&#128242; CONSULTAR</button>'
      +'</div></div>';
  }).join('');

  renderPag(lista.length);
}

function renderPag(total) {
  var cont = document.getElementById('paginacion');
  var totalPags = Math.ceil(total / POR_PAG);
  if(totalPags <= 1){ cont.innerHTML=''; return; }
  var h = '';
  if(pagina>1) h+='<button class="pag-btn" onclick="irPag('+(pagina-1)+')">&#8592; Anterior</button>';
  for(var i=1;i<=totalPags;i++) h+='<button class="pag-btn'+(i===pagina?' pag-activo':'')+'" onclick="irPag('+i+')">'+i+'</button>';
  if(pagina<totalPags) h+='<button class="pag-btn" onclick="irPag('+(pagina+1)+')">Siguiente &#8594;</button>';
  h+='<span class="pag-info">P&aacute;gina '+pagina+' de '+totalPags+' &middot; '+total+' prendas</span>';
  cont.innerHTML = h;
}

function irPag(n) {
  pagina = n;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function filtrar(tipo, val) {
  if(tipo==='cat'){ catActiva=val; pagina=1;
    document.querySelectorAll('#filtrosCat .filtro').forEach(function(b){ b.classList.toggle('activo', b.getAttribute('data-cat')===val); });
  } else { marcaActiva=val; pagina=1;
    document.querySelectorAll('#filtrosMarca .filtro').forEach(function(b){ b.classList.toggle('activo', b.getAttribute('data-marca')===val); });
  }
  render();
}

function construirFiltrosMarca() {
  var marcas = [];
  PRODS.forEach(function(p){ if(p.marca && marcas.indexOf(p.marca)<0) marcas.push(p.marca); });
  marcas.sort();
  var cont = document.getElementById('filtrosMarca');
  cont.innerHTML = '';
  var btn0 = document.createElement('button');
  btn0.className = 'filtro filtro-marca activo'; btn0.setAttribute('data-marca','all');
  btn0.textContent = 'Todas'; btn0.onclick = function(){ filtrar('marca','all'); };
  cont.appendChild(btn0);
  marcas.forEach(function(m){
    var btn = document.createElement('button');
    btn.className = 'filtro filtro-marca'; btn0.setAttribute('data-marca', m);
    btn.textContent = m; btn.setAttribute('data-marca', m);
    btn.onclick = function(){ filtrar('marca', m); };
    cont.appendChild(btn);
  });
}

function consultarBtn(btn) {
  var nombre = btn.getAttribute('data-n');
  var color  = btn.getAttribute('data-c');
  var precio = btn.getAttribute('data-p');
  var msg = 'Hola MAXUP! Me interesa:%0A' + encodeURIComponent(nombre) + '%0AColor: ' + encodeURIComponent(color) + '%0APrecio: $' + Number(precio).toLocaleString('es-AR') + '%0A%0A%C2%BFEst%C3%A1 disponible%3F';
  window.open('https://wa.me/5491168461457?text='+msg,'_blank');
}

// Cargar desde Sheets (reemplaza datos estáticos si hay)
async function cargarDesdeSheets() {
  try {
    var res = await fetch(API_URL + '?accion=indumentaria');
    if(!res.ok) return;
    var data = await res.json();
    if(data.ok && data.prendas && data.prendas.length > 0) {
      PRODS = data.prendas;
      construirFiltrosMarca();
      render();
    }
  } catch(e) {}
}

// Iniciar
construirFiltrosMarca();
render();
setTimeout(cargarDesdeSheets, 2000);
</script>

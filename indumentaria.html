<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indumentaria Deportiva — MAXUP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--sur:#111;--sur2:#161616;--bdr:rgba(255,255,255,.08);--cyan:#00C8FF;--pink:#FF0099;--green:#00FF88;--white:#f0f0f0;--gray:#888;--grad:linear-gradient(135deg,var(--cyan),var(--pink))}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:16px;padding:0 24px;height:56px}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-links{display:flex;gap:20px;list-style:none;margin-left:auto}
.nav-links a{color:var(--gray);text-decoration:none;font-size:.84rem;font-weight:600;letter-spacing:.05em;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-links a.active{color:var(--cyan)}

/* HERO */
.hero{padding:48px 24px 32px;text-align:center;max-width:1400px;margin:0 auto}
.hero-label{font-size:.72rem;font-weight:700;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;margin-bottom:10px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,4.5rem);letter-spacing:.06em;line-height:1;margin-bottom:10px}
.hero-desc{color:var(--gray);font-size:.9rem}

/* FILTROS */
.filtros-wrap{max-width:1400px;margin:0 auto;padding:0 24px}
.filtros-label{font-size:.68rem;font-weight:700;letter-spacing:.15em;color:var(--gray);text-transform:uppercase;margin:20px 0 8px}
.filtros{display:flex;flex-wrap:wrap;gap:7px}
.filtro{background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--gray);padding:6px 15px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.04em;font-family:'DM Sans',sans-serif}
.filtro:hover{border-color:rgba(0,200,255,.4);color:var(--white)}
.filtro.activo{background:var(--cyan);border-color:var(--cyan);color:#000}
.filtro-marca.activo{background:rgba(255,184,0,.15);border-color:#FFB800;color:#FFB800}

/* INFO */
.info-bar{max-width:1400px;margin:16px auto 0;padding:0 24px;color:var(--gray);font-size:.8rem}

/* GRID */
.grid-wrap{max-width:1400px;margin:14px auto 0;padding:0 24px}
.indum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}

/* CARD */
.indum-card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .2s;cursor:pointer}
.indum-card:hover{border-color:rgba(0,200,255,.35);transform:translateY(-2px)}
.indum-img{width:100%;aspect-ratio:1;background:var(--sur2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.indum-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.indum-card:hover .indum-img img{transform:scale(1.04)}
.indum-body{padding:12px;display:flex;flex-direction:column;gap:5px;flex:1}
.indum-marca{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:#FFB800;text-transform:uppercase}
.indum-cat{font-size:.65rem;font-weight:700;letter-spacing:.08em;color:var(--cyan);text-transform:uppercase}
.indum-nombre{font-size:.84rem;font-weight:600;color:var(--white);line-height:1.3}
.indum-color{font-size:.74rem;color:var(--gray);display:flex;align-items:center;gap:5px;margin-top:2px}
.indum-color::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--dot-color,#888);flex-shrink:0}
.indum-precio{font-size:1.05rem;font-weight:800;color:var(--cyan);margin-top:4px}
.indum-tarjeta{font-size:.7rem;color:#555}
.indum-talles{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.indum-talle-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#aaa;padding:2px 7px;border-radius:6px;font-size:.68rem;font-weight:600}
.indum-talle-pill.agotado{opacity:.35;text-decoration:line-through}
.indum-stock{font-size:.7rem;padding:2px 8px;border-radius:10px;width:fit-content;margin-top:4px}
.indum-stock.ok{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2)}
.indum-stock.last{background:rgba(255,165,0,.1);color:#FFA500;border:1px solid rgba(255,165,0,.25)}
.indum-btn{margin-top:auto;padding-top:4px;background:var(--grad);color:#000;border:none;border-radius:8px;padding:9px 10px;font-size:.78rem;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .2s;width:100%;font-family:'DM Sans',sans-serif}
.indum-btn:hover{opacity:.85}

/* PAGINACIÓN */
.paginacion{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:32px 24px 20px;max-width:1400px;margin:0 auto}
.pag-btn{background:rgba(255,255,255,.07);border:1px solid var(--bdr);color:var(--gray);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;transition:all .2s;font-family:'DM Sans',sans-serif}
.pag-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.pag-activo{background:var(--cyan)!important;border-color:var(--cyan)!important;color:#000!important;font-weight:700}
.pag-info{color:#555;font-size:.78rem;margin-left:4px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#141414;border:1px solid rgba(0,200,255,.2);border-radius:16px;max-width:480px;width:100%;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--gray);font-size:1.3rem;cursor:pointer;transition:color .2s}
.modal-close:hover{color:var(--white)}
.modal-marca{font-size:.7rem;font-weight:700;letter-spacing:.12em;color:#FFB800;text-transform:uppercase;margin-bottom:4px}
.modal-nombre{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;line-height:1.1;margin-bottom:6px}
.modal-color{font-size:.82rem;color:var(--gray);display:flex;align-items:center;gap:6px;margin-bottom:16px}
.modal-color::before{content:'';width:10px;height:10px;border-radius:50%;background:var(--dot-color,#888);flex-shrink:0}
.modal-codigo{font-size:.7rem;color:#444;margin-bottom:4px}
.modal-precios{margin-bottom:16px}
.modal-precio{font-size:1.5rem;font-weight:800;color:var(--cyan)}
.modal-tarjeta{font-size:.8rem;color:#555}
.modal-section-title{font-size:.72rem;font-weight:700;letter-spacing:.12em;color:var(--gray);text-transform:uppercase;margin-bottom:8px}
.modal-talles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.modal-talle{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);color:var(--white);padding:8px 16px;border-radius:8px;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.modal-talle:hover{border-color:var(--cyan);color:var(--cyan)}
.modal-talle.selected{background:rgba(0,200,255,.15);border-color:var(--cyan);color:var(--cyan)}
.modal-talle.agotado{opacity:.3;text-decoration:line-through;cursor:not-allowed;pointer-events:none}
.modal-talle-stock{font-size:.65rem;color:#888;margin-left:4px}
.modal-wa-btn{width:100%;background:var(--grad);color:#000;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:opacity .2s;font-family:'DM Sans',sans-serif}
.modal-wa-btn:hover{opacity:.88}
.modal-aviso{font-size:.75rem;color:#555;text-align:center;margin-top:8px}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;color:var(--gray)}

@media(max-width:600px){
  .indum-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .nav-links{display:none}
}
</style>
</head>

    <div class="modal-section-title">Elegí tu talle</div>

  </div>
</div>

var catActiva='all', marcaActiva='all', pagina=1, POR_PAG=24;

function cdot(c){
  var m={'NEGRO':'#222','BLANCO':'#eee','ROJO':'#e53','ROSA':'#f4a','ROSADO':'#f7b','FUCSIA':'#f06','LILA':'#b8f','VIOLETA':'#96f','MORADO':'#73c','AZUL':'#38f','CELESTE':'#5cf','VERDE PINO':'#2a5','VERDE':'#4c8','VERDE LIMA':'#9f0','VERDE MANZANA':'#7d0','VERDE AGUA':'#0d9','NARANJA':'#f80','AMARILLO':'#fe0','TURQUESA':'#0cd','MARRON':'#964','CHOCOLATE':'#7B3F00','GRIS':'#888','BEIGE':'#d9c'};
  var cu=(c||'').toUpperCase();
  for(var k in m){if(cu.indexOf(k)>=0)return m[k];}
  return '#888';
}

function getFiltrados(){
  return PRODS.filter(function(p){
    return(catActiva==='all'||p.cat===catActiva)&&(marcaActiva==='all'||p.marca===marcaActiva);
  });
}

function render(){
  var grid=document.getElementById('grid');
  var lista=getFiltrados();
  var tot=Math.ceil(lista.length/POR_PAG)||1;
  if(pagina>tot)pagina=1;
  var sl=lista.slice((pagina-1)*POR_PAG,pagina*POR_PAG);
  document.getElementById('infoBar').textContent=lista.length+' prenda'+(lista.length!==1?'s':'')+' disponibles';
  if(!lista.length){
    grid.innerHTML='<div class="empty"><p style="font-size:2rem">&#128085;</p><p style="margin-top:12px">No hay prendas en esta categoría.</p></div>';
    document.getElementById('paginacion').innerHTML='';return;
  }
  grid.innerHTML=sl.map(function(p){
    var dot=cdot(p.color);
    var last=p.stock===1;
    var img=p.img?'<img src="'+p.img+'" alt="'+p.nombre+'" loading="lazy">':'&#128085;';
    var talles=p.talles.map(function(t){
      return'<span class="indum-talle-pill'+(t.stock===0?' agotado':'')+'">'+t.talle+'</span>';
    }).join('');
    return'<div class="indum-card" onclick="abrirModal('+PRODS.indexOf(p)+')">'
      +'<div class="indum-img">'+img+'</div>'
      +'<div class="indum-body">'
      +(p.marca?'<div class="indum-marca">'+p.marca+'</div>':'')
      +'<div class="indum-cat">'+p.cat+'</div>'
      +'<div class="indum-nombre">'+p.nombre+'</div>'
      +'<div class="indum-color" style="--dot-color:'+dot+'">'+p.color+'</div>'
      +'<div class="indum-precio">$'+p.precio.toLocaleString('es-AR')+'</div>'
      +'<div class="indum-tarjeta">Tarjeta $'+(p.precio_lista||Math.round(p.precio*1.06)).toLocaleString('es-AR')+'</div>'
      +'<div class="indum-talles">'+talles+'</div>'
      +'<div class="indum-stock '+(last?'last':'ok')+'">'+(last?'¡Última unidad!':p.stock+' disponibles')+'</div>'
      +'<button class="indum-btn">Ver talles y consultar</button>'
      +'</div></div>';
  }).join('');
  renderPag(lista.length);
}

function renderPag(total){
  var cont=document.getElementById('paginacion');
  var tot=Math.ceil(total/POR_PAG);
  if(tot<=1){cont.innerHTML='';return;}
  var h='';
  if(pagina>1)h+='<button class="pag-btn" onclick="irPag('+(pagina-1)+')">&#8592; Anterior</button>';
  for(var i=1;i<=tot;i++)h+='<button class="pag-btn'+(i===pagina?' pag-activo':'')+'" onclick="irPag('+i+')">'+i+'</button>';
  if(pagina<tot)h+='<button class="pag-btn" onclick="irPag('+(pagina+1)+')">Siguiente &#8594;</button>';
  h+='<span class="pag-info">Página '+pagina+' de '+tot+' · '+total+' prendas</span>';
  cont.innerHTML=h;
}

function irPag(n){pagina=n;render();window.scrollTo({top:0,behavior:'smooth'});}

function filtrar(tipo,val){
  if(tipo==='cat'){catActiva=val;pagina=1;
    document.querySelectorAll('#filtrosCat .filtro').forEach(function(b){b.classList.toggle('activo',b.getAttribute('data-cat')===val);});
  }else{marcaActiva=val;pagina=1;
    document.querySelectorAll('#filtrosMarca .filtro').forEach(function(b){b.classList.toggle('activo',b.getAttribute('data-marca')===val);});
  }
  render();
}

  marcas.sort();
  var cont=document.getElementById('filtrosMarca');
  cont.innerHTML='';
  function mkBtn(marca,label,isActive){
    var b=document.createElement('button');
    b.className='filtro filtro-marca'+(isActive?' activo':'');
    b.setAttribute('data-marca',marca);
    b.textContent=label;
    b.onclick=function(){filtrar('marca',marca);};
    cont.appendChild(b);
  }
  mkBtn('all','Todas las marcas',true);
  marcas.forEach(function(m){mkBtn(m,m,false);});
}

// MODAL
function abrirModal(idx){
  var p=PRODS[idx];
  if(!p)return;
  modalProd=p;
  talleSeleccionado=null;
  document.getElementById('mMarca').textContent=p.marca||'';
  document.getElementById('mNombre').textContent=p.nombre;
  document.getElementById('mCodigo').textContent=p.codigo?'Código: '+p.codigo:'';
  var dot=cdot(p.color);
  document.getElementById('mColor').style.setProperty('--dot-color',dot);
  document.getElementById('mColor').textContent=p.color;
  document.getElementById('mPrecio').textContent='$'+p.precio.toLocaleString('es-AR')+' efectivo';
  document.getElementById('mTarjeta').textContent='Tarjeta: $'+(p.precio_lista||Math.round(p.precio*1.06)).toLocaleString('es-AR');
  
  // Talles
  var cont=document.getElementById('mTalles');
  cont.innerHTML='';
  p.talles.forEach(function(t){
    var b=document.createElement('button');
    b.className='modal-talle'+(t.stock===0?' agotado':'');
    b.innerHTML=t.talle+'<span class="modal-talle-stock">('+t.stock+')</span>';
    b.setAttribute('data-talle',t.talle);
    if(t.stock>0){
      b.onclick=function(){
        talleSeleccionado=t.talle;
        cont.querySelectorAll('.modal-talle').forEach(function(x){x.classList.remove('selected');});
        b.classList.add('selected');
      };
    }
    cont.appendChild(b);
  });
  
  // Si solo hay un talle con stock, preseleccionar
  var disponibles=p.talles.filter(function(t){return t.stock>0;});
  if(disponibles.length===1){
    talleSeleccionado=disponibles[0].talle;
    var btn=cont.querySelector('[data-talle="'+disponibles[0].talle+'"]');
    if(btn)btn.classList.add('selected');
  }
  
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';
}

function cerrarModal(e){
  if(e&&e.target!==document.getElementById('modalBg'))return;
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow='';
}

function cerrarModalBtn(){
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow='';
}

function consultarWhatsApp(){
  var p=modalProd;
  if(!p)return;
  if(!talleSeleccionado && p.talles.filter(function(t){return t.stock>0;}).length>1){
    alert('Por favor seleccioná un talle antes de consultar.');
    return;
  }
  var talle=talleSeleccionado||p.talles[0].talle;
  var codigo=p.codigo?'\nCódigo: #'+p.codigo:'';
  var msg='Hola MAXUP! Me interesa esta prenda:'
    +codigo
    +'\n👗 '+p.nombre
    +'\n📏 Talle: '+talle
    +'\n🎨 Color: '+p.color
    +'\n💰 Precio: $'+p.precio.toLocaleString('es-AR')
    +'\n\n¿Está disponible?';
  window.open('https://wa.me/5491168461457?text='+encodeURIComponent(msg),'_blank');
}

// Cargar desde Sheets
async function cargarSheets(){
  try{
    var res=await fetch(API_URL+'?accion=indumentaria');
    if(!res.ok)return;
    var data=await res.json();
    if(data.ok&&data.prendas&&data.prendas.length>0){
      PRODS=data.prendas;
      construirFiltrosMarca();
      render();
    }
  }catch(e){}
}

construirFiltrosMarca();
render();
setTimeout(cargarSheets,2000);
</script>

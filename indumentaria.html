<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indumentaria Deportiva — MAXUP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--s1:#111;--s2:#161616;--bdr:rgba(255,255,255,.08);--cyan:#00C8FF;--pink:#FF0099;--green:#00FF88;--white:#f0f0f0;--gray:#888;--grad:linear-gradient(135deg,var(--cyan),var(--pink))}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:"DM Sans",sans-serif;min-height:100vh}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:16px;padding:0 24px;height:56px}
.nav-brand{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:.1em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-links{display:flex;gap:20px;list-style:none;margin-left:auto}
.nav-links a{color:var(--gray);text-decoration:none;font-size:.84rem;font-weight:600;letter-spacing:.05em;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-links a.active{color:var(--cyan)}
.hero{padding:48px 24px 28px;text-align:center;max-width:1400px;margin:0 auto}
.hero-lbl{font-size:.7rem;font-weight:700;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;margin-bottom:10px}
.hero-t{font-family:"Bebas Neue",sans-serif;font-size:clamp(2.5rem,8vw,4.5rem);letter-spacing:.06em;line-height:1;margin-bottom:10px}
.hero-d{color:var(--gray);font-size:.9rem}
.wrap{max-width:1400px;margin:0 auto;padding:0 24px}
.flbl{font-size:.68rem;font-weight:700;letter-spacing:.15em;color:var(--gray);text-transform:uppercase;margin:20px 0 8px}
.frow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.ftag{background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--gray);padding:6px 15px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:"DM Sans",sans-serif}
.ftag:hover{border-color:rgba(0,200,255,.4);color:var(--white)}
.ftag.on{background:var(--cyan);border-color:var(--cyan);color:#000}
.ftag.marca-on{background:rgba(255,184,0,.15);border-color:#FFB800;color:#FFB800}
.info{color:var(--gray);font-size:.8rem;margin:14px 0 4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-top:14px}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:border-color .2s,transform .2s}
.card:hover{border-color:rgba(0,200,255,.4);transform:translateY(-2px)}
.cimg{width:100%;aspect-ratio:1;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;overflow:hidden}
.cimg img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .cimg img{transform:scale(1.04)}
.cbody{padding:12px;display:flex;flex-direction:column;gap:5px;flex:1}
.cmarca{font-size:.64rem;font-weight:700;letter-spacing:.1em;color:#FFB800;text-transform:uppercase}
.ccat{font-size:.64rem;font-weight:700;letter-spacing:.08em;color:var(--cyan);text-transform:uppercase}
.cnombre{font-size:.85rem;font-weight:600;color:var(--white);line-height:1.3}
.cprecio{font-size:1.05rem;font-weight:800;color:var(--cyan);margin-top:4px}
.ctarjeta{font-size:.7rem;color:#555}
.cvars{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.cpill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#bbb;padding:2px 7px;border-radius:6px;font-size:.68rem;font-weight:600}
.cpill.ago{opacity:.3;text-decoration:line-through}
.cstock{font-size:.7rem;padding:2px 8px;border-radius:10px;width:fit-content;margin-top:4px}
.cstock.ok{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2)}
.cstock.last{background:rgba(255,165,0,.1);color:#FFA500;border:1px solid rgba(255,165,0,.25)}
.cbtn{margin-top:auto;padding:9px 10px;background:var(--grad);color:#000;border:none;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;letter-spacing:.04em;width:100%;font-family:"DM Sans",sans-serif;transition:opacity .2s}
.cbtn:hover{opacity:.85}
.pagwrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:32px 24px 20px}
.pbtn{background:rgba(255,255,255,.07);border:1px solid var(--bdr);color:var(--gray);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;transition:all .2s;font-family:"DM Sans",sans-serif}
.pbtn:hover{border-color:var(--cyan);color:var(--cyan)}
.pbtn.on{background:var(--cyan);border-color:var(--cyan);color:#000;font-weight:700}
.pinfo{color:#555;font-size:.78rem;margin-left:4px}
.empty{text-align:center;padding:60px 24px;color:var(--gray)}
/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex}
.mbox{background:#141414;border:1px solid rgba(0,200,255,.2);border-radius:16px;max-width:500px;width:100%;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.mclose{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--gray);font-size:1.3rem;cursor:pointer}
.mclose:hover{color:var(--white)}
.mmarca{font-size:.68rem;font-weight:700;letter-spacing:.12em;color:#FFB800;text-transform:uppercase;margin-bottom:4px}
.mnombre{font-family:"Bebas Neue",sans-serif;font-size:1.7rem;letter-spacing:.05em;line-height:1.1;margin-bottom:4px}
.mcodigo{font-size:.7rem;color:#444;margin-bottom:12px}
.mprecios{margin-bottom:18px}
.mprecio{font-size:1.5rem;font-weight:800;color:var(--cyan)}
.mtarjeta{font-size:.8rem;color:#555}
.msect{font-size:.7rem;font-weight:700;letter-spacing:.13em;color:var(--gray);text-transform:uppercase;margin-bottom:8px}
/* Selector de talle + color */
.mtalles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.mtalle{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);color:var(--white);padding:8px 16px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:"DM Sans",sans-serif;display:flex;flex-direction:column;align-items:center;gap:2px}
.mtalle:hover{border-color:var(--cyan)}
.mtalle.sel{background:rgba(0,200,255,.12);border-color:var(--cyan);color:var(--cyan)}
.mtalle.ago{opacity:.3;text-decoration:line-through;cursor:not-allowed;pointer-events:none}
.mtalle small{font-size:.65rem;color:#888;font-weight:400}
.mwabtn{width:100%;background:var(--grad);color:#000;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:opacity .2s;font-family:"DM Sans",sans-serif}
.mwabtn:hover{opacity:.88}
.maviso{font-size:.74rem;color:#444;text-align:center;margin-top:8px}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}.nav-links{display:none}}
</style>
</head>

  </div>
</div>

var catA='all',marcaA='all',pag=1,PPP=24;
var mProd=null,mSel=null;
var API='https://script.google.com/macros/s/AKfycbwUujcSoSyBWLLla-LOdovJmTDan-DP3O9Gp0k_MSupTHGEPB55TCZqllvGmEK6vlk/exec';

function cdot(c){
  var m={'NEGRO':'#222','BLANCO':'#eee','ROJO':'#e53','ROSA':'#f4a','ROSADO':'#f7b','FUCSIA':'#f06','LILA':'#b8f','VIOLETA':'#96f','MORADO':'#73c','AZUL':'#38f','CELESTE':'#5cf','VERDE PINO':'#2a5','VERDE AGUA':'#0d9','VERDE LIMA':'#9f0','VERDE MANZANA':'#7d0','VERDE':'#4c8','NARANJA':'#f80','AMARILLO':'#fe0','TURQUESA':'#0cd','MARRON':'#964','CHOCOLATE':'#7B3F00','GRIS':'#888','BEIGE':'#d9c'};
  var cu=(c||'').toUpperCase();
  for(var k in m){if(cu.indexOf(k)>=0)return m[k];}
  return '#888';
}

function getFil(){
  return PRODS.filter(function(p){
    return(catA==='all'||p.cat===catA)&&(marcaA==='all'||p.marca===marcaA);
  });
}

function render(){
  var grid=document.getElementById('grid');
  var lista=getFil();
  var tot=Math.ceil(lista.length/PPP)||1;
  if(pag>tot)pag=1;
  var sl=lista.slice((pag-1)*PPP,pag*PPP);
  document.getElementById('info').textContent=lista.length+' prenda'+(lista.length!==1?'s':'')+' disponibles';
  if(!lista.length){
    grid.innerHTML='<div class="empty"><p style="font-size:2.5rem">&#128085;</p><p style="margin-top:12px">No hay prendas en esta categoría.</p></div>';
    document.getElementById('pag').innerHTML='';return;
  }
  grid.innerHTML=sl.map(function(p){
    var idx=PRODS.indexOf(p);
    var img=p.img?'<img src="'+p.img+'" alt="'+p.nombre+'" loading="lazy">':'&#128085;';
    // Mostrar variantes (talle + color) disponibles como pills
    var pills=p.variantes.map(function(v){
      var dot=cdot(v.color);
      var lbl=v.talle+(v.color&&v.color!==p.variantes[0].color?'/'+v.color:'');
      return'<span class="cpill'+(v.stock===0?' ago':'')+'" style="border-color:'+dot+'20;background:'+dot+'15;color:'+dot+'">'+lbl+'</span>';
    }).join('');
    var last=p.stock===1;
    return'<div class="card" onclick="aModal('+idx+')">'
      +'<div class="cimg">'+img+'</div>'
      +'<div class="cbody">'
      +(p.marca?'<div class="cmarca">'+p.marca+'</div>':'')
      +'<div class="ccat">'+p.cat+'</div>'
      +'<div class="cnombre">'+p.nombre+'</div>'
      +'<div class="cprecio">$'+p.precio.toLocaleString('es-AR')+'</div>'
      +'<div class="ctarjeta">Tarjeta $'+(p.precio_lista||Math.round(p.precio*1.06)).toLocaleString('es-AR')+'</div>'
      +'<div class="cvars">'+pills+'</div>'
      +'<div class="cstock '+(last?'last':'ok')+'">'+(last?'¡Última unidad!':p.stock+' disp.')+'</div>'
      +'<button class="cbtn">Ver talles</button>'
      +'</div></div>';
  }).join('');
  renderPag(lista.length);
}

function renderPag(total){
  var cont=document.getElementById('pag');
  var tot=Math.ceil(total/PPP);
  if(tot<=1){cont.innerHTML='';return;}
  var h='';
  if(pag>1)h+='<button class="pbtn" onclick="irP('+(pag-1)+')">&#8592;</button>';
  for(var i=1;i<=tot;i++)h+='<button class="pbtn'+(i===pag?' on':'')+'" onclick="irP('+i+')">'+i+'</button>';
  if(pag<tot)h+='<button class="pbtn" onclick="irP('+(pag+1)+')">&#8594;</button>';
  h+='<span class="pinfo">Pág. '+pag+'/'+tot+' · '+total+' prendas</span>';
  cont.innerHTML=h;
}

function irP(n){pag=n;render();window.scrollTo({top:0,behavior:'smooth'});}

function fil(tipo,val){
  if(tipo==='cat'){catA=val;pag=1;
    document.querySelectorAll('#fCat .ftag').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-v')===val);});
  }else{marcaA=val;pag=1;
    document.querySelectorAll('#fMarca .ftag').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-v')===val);b.classList.toggle('marca-on',b.getAttribute('data-v')===val&&val!=='all');});
  }
  render();
}

function buildMarcas(){
  var marcas=[];
  PRODS.forEach(function(p){if(p.marca&&marcas.indexOf(p.marca)<0)marcas.push(p.marca);});
  marcas.sort();
  var cont=document.getElementById('fMarca');
  cont.innerHTML='';
  function mk(v,lbl,on,esMarca){
    var b=document.createElement('button');
    b.className='ftag'+(on?' on':'')+(esMarca&&on?' marca-on':'');
    b.setAttribute('data-v',v);
    b.textContent=lbl;
    b.onclick=function(){fil('marca',v);};
    cont.appendChild(b);
  }
  mk('all','Todas las marcas',true,false);
  marcas.forEach(function(m){mk(m,m,false,true);});
}

// MODAL
function aModal(idx){
  var p=PRODS[idx];
  if(!p)return;
  mProd=p;mSel=null;
  document.getElementById('mMarca').textContent=p.marca||'';
  document.getElementById('mNombre').textContent=p.nombre;
  document.getElementById('mCodigo').textContent=p.codigo?'Código: #'+p.codigo:'';
  document.getElementById('mPrecio').textContent='$'+p.precio.toLocaleString('es-AR')+' efectivo';
  document.getElementById('mTarjeta').textContent='Tarjeta: $'+(p.precio_lista||Math.round(p.precio*1.06)).toLocaleString('es-AR');
  var cont=document.getElementById('mTalles');
  cont.innerHTML='';
  var disp=p.variantes.filter(function(v){return v.stock>0;});
  p.variantes.forEach(function(v){
    var b=document.createElement('button');
    b.className='mtalle'+(v.stock===0?' ago':'');
    var dot=cdot(v.color);
    b.innerHTML='<span style="color:'+dot+'">&#11044;</span> '+v.talle
      +(v.color?'<small>'+v.color+'</small>':'')
      +'<small>'+v.stock+' ud.</small>';
    b.setAttribute('data-talle',v.talle);
    b.setAttribute('data-color',v.color);
    if(v.stock>0){
      b.onclick=function(){
        mSel={talle:v.talle,color:v.color};
        cont.querySelectorAll('.mtalle').forEach(function(x){x.classList.remove('sel');});
        b.classList.add('sel');
      };
    }
    cont.appendChild(b);
  });
  // Preseleccionar si solo hay 1 disponible
  if(disp.length===1){
    mSel={talle:disp[0].talle,color:disp[0].color};
    var btn=cont.querySelector('[data-talle="'+disp[0].talle+'"]');
    if(btn)btn.classList.add('sel');
  }
  document.getElementById('mbg').classList.add('open');
  document.body.style.overflow='hidden';
}

function cModal(e){if(e&&e.target!==document.getElementById('mbg'))return;cModalBtn();}
function cModalBtn(){document.getElementById('mbg').classList.remove('open');document.body.style.overflow='';}

function waConsultar(){
  if(!mProd)return;
  var disp=mProd.variantes.filter(function(v){return v.stock>0;});
  if(!mSel&&disp.length>1){alert('Por favor elegí un talle antes de consultar.');return;}
  var sel=mSel||disp[0];
  var msg='Hola MAXUP! Me interesa esta prenda:'
    +(mProd.codigo?'\nCódigo: #'+mProd.codigo:'')
    +'\n👗 '+mProd.nombre
    +'\n📏 Talle: '+sel.talle
    +(sel.color?'\n🎨 Color: '+sel.color:'')
    +'\n💰 Precio: $'+mProd.precio.toLocaleString('es-AR')
    +'\n\n¿Está disponible?';
  window.open('https://wa.me/5491168461457?text='+encodeURIComponent(msg),'_blank');
}

async function cargarSheets(){
  try{
    var r=await fetch(API+'?accion=indumentaria');
    if(!r.ok)return;
    var d=await r.json();
    if(d.ok&&d.prendas&&d.prendas.length>0){PRODS=d.prendas;buildMarcas();render();}
  }catch(e){}
}

buildMarcas();
render();
setTimeout(cargarSheets,2000);
</script>
